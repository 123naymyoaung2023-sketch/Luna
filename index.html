<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  
  <title>Luna POS - Moonlight Theme</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Moonlight Theme Background */
    body { 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
      overflow: hidden; 
      background-color: #0f172a;
      /* လရောင်ဖြာကျနေသည့်ပုံစံ (Radial Gradient) */
      background-image: radial-gradient(circle at 80% -10%, #38bdf8 0%, #1e3a8a 40%, #0f172a 80%, #020617 100%);
      background-attachment: fixed;
      color: #f8fafc;
    }
    input, textarea, select {
      user-select: text;
      -webkit-user-select: text;
    }
    /* Select Options inside dark theme */
    option {
      background-color: #1e293b;
      color: #ffffff;
    }
    
    /* Scrollbar Style for dark theme */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(56, 189, 248, 0.3); border-radius: 20px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(56, 189, 248, 0.6); }

    /* Content Area Padding to clear bottom nav */
    .content-area {
      padding-bottom: calc(100px + env(safe-area-inset-bottom));
    }
    @media (min-width: 768px) {
      .content-area {
        padding-bottom: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, Fragment } = React;
    
    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyDoG1aWaNi9QNe0oMeGCEM7BRCaOhnZB_w",
      authDomain: "naynnay.firebaseapp.com",
      projectId: "naynnay",
      storageBucket: "naynnay.firebasestorage.app",
      messagingSenderId: "558678602864",
      appId: "1:558678602864:web:f8c6b9f38d4edda08430b5",
      measurementId: "G-R3SYVK6PS2"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const APP_ID = typeof window.__app_id !== 'undefined' ? window.__app_id : 'luna-pos';

    // --- Luna Glassmorphism Styles ---
    const styles = {
      neoCard: "bg-white/10 backdrop-blur-md rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-white/20 overflow-hidden text-white",
      neoInput: "w-full bg-slate-900/50 rounded-2xl p-4 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all text-white placeholder-blue-200/50 font-bold border border-white/10 shadow-inner",
      neoBtn: "bg-white/10 hover:bg-white/20 rounded-2xl p-4 font-bold transition-all flex items-center justify-center gap-2 border border-white/20 text-white shadow-sm disabled:opacity-50",
      neoBtnPrimary: "bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white rounded-2xl p-4 font-bold transition-all flex items-center justify-center gap-2 disabled:opacity-50 shadow-[0_0_15px_rgba(6,182,212,0.5)] border border-cyan-400/50",
      headerText: "text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-200 to-blue-200 drop-shadow-[0_0_10px_rgba(165,243,252,0.5)]",
    };

    const dict = {
      my: {
        system: "စနစ်", purchase: "ဝယ်ယူမှု", sale: "ရောင်းချမှု", preorder: "Pre-Order",
        customer: "ဖောက်သည်", expense: "အသုံးစရိတ်", report: "အစီရင်ခံစာ",
        login: "အကောင့်ဝင်ရန်", signup: "အကောင့်သစ်ဖွင့်ရန်", email: "အီးမေးလ်", password: "စကားဝှက်",
        guestLogin: "Guest အဖြစ်ဝင်ရန်", logout: "ထွက်မည်", langSwitch: "English",
        add: "အသစ်ထည့်မည်", save: "သိမ်းမည်", cancel: "မလုပ်တော့ပါ", delete: "ဖျက်မည်", edit: "ပြင်မည်",
        search: "ရှာဖွေရန်...", name: "အမည်", cost: "အရင်း", price: "ရောင်းဈေး", qty: "အရေအတွက်", 
        expDate: "သက်တမ်းကုန်ရက်", total: "စုစုပေါင်း", paid: "ငွေချေပြီး", unpaid: "ငွေမချေရသေး",
        serviceFee: "ဝန်ဆောင်ခ", payAmount: "ပေးချေငွေ", balance: "လက်ကျန်ငွေ",
        daily: "နေ့စဉ်", weekly: "အပတ်စဉ်", monthly: "လစဉ်", yearly: "နှစ်စဉ်", grandTotal: "စုစုပေါင်း အသားတင်",
        bestSelling: "အရောင်းရဆုံး ပစ္စည်းများ", inventory: "လက်ကျန် ပစ္စည်းတန်ဖိုး",
        deductProfit: "အမြတ်ထဲမှ နုတ်မည်"
      },
      en: {
        system: "System", purchase: "Purchase", sale: "Sale", preorder: "Pre-Order",
        customer: "Customer", expense: "Expense", report: "Report",
        login: "Login", signup: "Sign Up", email: "Email", password: "Password",
        guestLogin: "Login as Guest", logout: "Log Out", langSwitch: "မြန်မာစာ",
        add: "Add New", save: "Save", cancel: "Cancel", delete: "Delete", edit: "Edit",
        search: "Search...", name: "Name", cost: "Cost", price: "Price", qty: "Quantity", 
        expDate: "Expiry Date", total: "Total", paid: "Paid", unpaid: "Unpaid",
        serviceFee: "Service Fee", payAmount: "Pay Amount", balance: "Balance",
        daily: "Daily", weekly: "Weekly", monthly: "Monthly", yearly: "Yearly", grandTotal: "Grand Total",
        bestSelling: "Best Selling", inventory: "Inventory Asset",
        deductProfit: "Deduct from Profit"
      }
    };

    // ==========================================
    // AUTH SCREEN
    // ==========================================
    const AuthScreen = ({ showAlert }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault(); setLoading(true);
        try {
          if (isLogin) await auth.signInWithEmailAndPassword(email, password);
          else await auth.createUserWithEmailAndPassword(email, password);
        } catch (error) { 
          showAlert(error.message); 
        } finally { setLoading(false); }
      };

      return (
        <div className="h-[100dvh] w-full flex items-center justify-center p-4">
          <div className={`${styles.neoCard} p-8 w-full max-w-md animate-in fade-in zoom-in`}>
            <div className="text-center mb-8"><h1 className={styles.headerText}>Luna POS</h1><p className="mt-2 text-sm font-bold text-cyan-100/70">{isLogin ? "အကောင့်ဝင်ပါ" : "အကောင့်သစ်ဖွင့်ပါ"}</p></div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <input type="email" placeholder="Email" required className={styles.neoInput} value={email} onChange={e=>setEmail(e.target.value)} />
              <input type="password" placeholder="Password" required className={styles.neoInput} value={password} onChange={e=>setPassword(e.target.value)} />
              <button type="submit" disabled={loading} className={`${styles.neoBtnPrimary} w-full h-14`}>{loading ? <i className="fas fa-spinner fa-spin"></i> : (isLogin ? "အကောင့်ဝင်မည်" : "အကောင့်ဖွင့်မည်")}</button>
            </form>
            <div className="mt-6 flex flex-col gap-4 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-cyan-400 font-bold hover:underline">{isLogin ? "အကောင့်သစ်ဖွင့်မည်" : "အကောင့်ရှိပြီးသားဖြစ်သည်"}</button>
              <div className="flex items-center gap-2"><hr className="flex-1 border-white/20" /><span className="text-xs text-white/50 font-bold">OR</span><hr className="flex-1 border-white/20" /></div>
              <button onClick={()=>auth.signInAnonymously()} disabled={loading} className={`${styles.neoBtn} w-full h-12 text-white`}><i className="fas fa-user-secret"></i> Guest အဖြစ်ဝင်မည်</button>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // SYSTEM TAB
    // ==========================================
    const SystemTab = ({ user, showAlert }) => (
      <div className="space-y-6 animate-in fade-in">
        <h2 className={styles.headerText}>စနစ် (System)</h2>
        <div className={`${styles.neoCard} p-6 space-y-6`}>
          <div className="flex items-center gap-4 border-b border-white/10 pb-4">
            <div className="w-16 h-16 bg-cyan-500/20 border border-cyan-400/50 rounded-full flex items-center justify-center text-cyan-300 text-2xl font-black shadow-[0_0_15px_rgba(34,211,238,0.3)]">{user.isAnonymous ? "G" : (user.email ? user.email.charAt(0).toUpperCase() : "U")}</div>
            <div><p className="font-black text-lg text-white">{user.isAnonymous ? "Guest Account" : user.email}</p><p className="text-xs text-cyan-100/50 font-bold">User ID: {user.uid}</p></div>
          </div>
          <button onClick={() => auth.signOut().catch(e=>showAlert(e.message))} className={`${styles.neoBtn} text-rose-400 hover:text-rose-300 hover:bg-rose-500/20 border-rose-500/30 md:w-48`}><i className="fas fa-sign-out-alt"></i> ထွက်မည် (Log Out)</button>
        </div>
      </div>
    );

    // ==========================================
    // PURCHASE TAB
    // ==========================================
    const PurchaseTab = ({ products, userId, showAlert, showConfirm }) => {
      const [search, setSearch] = useState('');
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ id: null, name: '', cost: '', price: '', qty: '', expDate: '' });

      const sortedProducts = useMemo(() => products.filter(p => (p.name || '').toLowerCase().includes(search.toLowerCase())).sort((a, b) => (a.name || '').localeCompare(b.name || '')), [products, search]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const data = { name: form.name, cost: Number(form.cost), price: Number(form.price), quantity: Number(form.qty), expiredDate: form.expDate };
          const ref = db.collection(`artifacts/${APP_ID}/users/${userId}/products`);
          if (form.id) await ref.doc(form.id).update(data); else await ref.add(data);
          setShowForm(false); setForm({ id: null, name: '', cost: '', price: '', qty: '', expDate: '' });
          showAlert("သိမ်းဆည်းပြီးပါပြီ။");
        } catch (err) { showAlert(err.message); }
      };

      const deleteItem = (id) => showConfirm('ပစ္စည်းကို ဖယ်ရှားရန် သေချာပါသလား?', async () => {
        try { await db.collection(`artifacts/${APP_ID}/users/${userId}/products`).doc(id).delete(); } catch (err) { showAlert(err.message); }
      });

      const getRowStyle = (p) => {
        if (!p.expiredDate) return styles.neoCard;
        const today = new Date(); const exp = new Date(p.expiredDate);
        const monthsDiff = (exp.getFullYear() - today.getFullYear()) * 12 + (exp.getMonth() - today.getMonth());
        const isLowQty = p.quantity < 10; const isExpiring = monthsDiff < 3 && monthsDiff >= 0;
        if (isLowQty && isExpiring) return "bg-orange-500/20 border-orange-400/50 text-orange-100 backdrop-blur-md rounded-3xl shadow-xl overflow-hidden";
        if (isLowQty) return "bg-rose-500/20 border-rose-400/50 text-rose-100 backdrop-blur-md rounded-3xl shadow-xl overflow-hidden";
        if (isExpiring) return "bg-amber-500/20 border-amber-400/50 text-amber-100 backdrop-blur-md rounded-3xl shadow-xl overflow-hidden";
        return styles.neoCard;
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4"><h2 className={styles.headerText}>ပစ္စည်းစာရင်း (Inventory)</h2><button onClick={() => setShowForm(!showForm)} className={styles.neoBtnPrimary}><i className="fas fa-plus"></i> အသစ်ထည့်မည်</button></div>
          {showForm && (
            <form onSubmit={handleSubmit} className={`${styles.neoCard} p-6 grid grid-cols-1 md:grid-cols-2 gap-4`}>
              <input required placeholder="ပစ္စည်းအမည်" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder="အရင်း" value={form.cost} onChange={e=>setForm({...form, cost: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder="ရောင်းဈေး" value={form.price} onChange={e=>setForm({...form, price: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder="အရေအတွက်" value={form.qty} onChange={e=>setForm({...form, qty: e.target.value})} className={styles.neoInput} />
              <input type="date" placeholder="ကုန်ဆုံးရက်" value={form.expDate} onChange={e=>setForm({...form, expDate: e.target.value})} className={styles.neoInput} />
              {/* Fix for mobile button hiding: Add mb-24 */}
              <div className="md:col-span-2 flex justify-end gap-4 mt-4 mb-24 md:mb-4"><button type="button" onClick={()=>setShowForm(false)} className={`${styles.neoBtn} flex-1 md:flex-none`}>မလုပ်တော့ပါ</button><button type="submit" className={`${styles.neoBtnPrimary} flex-1 md:flex-none`}>သိမ်းမည်</button></div>
            </form>
          )}
          <div className="relative"><i className="fas fa-search absolute left-4 top-5 text-cyan-300"></i><input type="text" placeholder="ရှာဖွေရန်..." value={search} onChange={e=>setSearch(e.target.value)} className={`${styles.neoInput} pl-12`} /></div>
          <div className="grid gap-4 pb-10">
            {sortedProducts.length === 0 && <p className="text-white/50 text-center py-8 font-bold">ပစ္စည်းမရှိသေးပါ။</p>}
            {sortedProducts.map(p => (
              <div key={p.id} className={`${getRowStyle(p)} p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4`}>
                <div><h3 className="font-bold text-lg">{p.name}</h3><p className="text-sm text-cyan-100/80">ရင်း: {p.cost} | ရောင်း: {p.price} | လက်ကျန်: <span className="font-extrabold text-cyan-300">{p.quantity}</span></p></div>
                <div className="flex gap-2"><button onClick={()=> { setForm({ id: p.id, name: p.name, cost: p.cost, price: p.price, qty: p.quantity, expDate: p.expiredDate||'' }); setShowForm(true); }} className="p-2 text-blue-300 hover:text-blue-200 bg-white/5 rounded-lg"><i className="fas fa-edit"></i></button><button onClick={()=>deleteItem(p.id)} className="p-2 text-rose-400 hover:text-rose-300 bg-white/5 rounded-lg"><i className="fas fa-trash-alt"></i></button></div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ==========================================
    // EXPENSE TAB
    // ==========================================
    const ExpenseTab = ({ expenses, userId, showAlert, showConfirm }) => {
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ id: null, name: '', amount: '', deductProfit: true });

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const data = { name: form.name, amount: Number(form.amount), deductProfit: form.deductProfit, date: new Date().toISOString() };
          if (form.id) await db.collection(`artifacts/${APP_ID}/users/${userId}/expenses`).doc(form.id).update(data);
          else await db.collection(`artifacts/${APP_ID}/users/${userId}/expenses`).add(data);
          setShowForm(false); setForm({ id: null, name: '', amount: '', deductProfit: true });
        } catch (err) { showAlert(err.message); }
      };

      const deleteItem = (id) => showConfirm('ဖယ်ရှားရန် သေချာပါသလား?', async () => {
        try { await db.collection(`artifacts/${APP_ID}/users/${userId}/expenses`).doc(id).delete(); } catch (err) { showAlert(err.message); }
      });

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="flex justify-between items-center"><h2 className={styles.headerText}>အသုံးစရိတ် (Expense)</h2><button onClick={() => setShowForm(!showForm)} className={styles.neoBtnPrimary}><i className="fas fa-plus"></i></button></div>
          {showForm && (
            <form onSubmit={handleSubmit} className={`${styles.neoCard} p-6 grid grid-cols-1 md:grid-cols-2 gap-4`}>
              <input required placeholder="အမည်" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder="Amount" value={form.amount} onChange={e=>setForm({...form, amount: e.target.value})} className={styles.neoInput} />
              <label className="flex items-center gap-3 md:col-span-2 font-bold text-cyan-100"><input type="checkbox" checked={form.deductProfit} onChange={e=>setForm({...form, deductProfit: e.target.checked})} className="w-5 h-5 accent-cyan-500 rounded" /> အမြတ်ထဲမှ နုတ်မည်</label>
              {/* Fix for mobile button hiding: Add mb-24 */}
              <div className="md:col-span-2 flex flex-col md:flex-row justify-end gap-4 mt-4 mb-24 md:mb-4"><button type="button" onClick={()=>setShowForm(false)} className={styles.neoBtn}>မလုပ်တော့ပါ</button><button type="submit" className={styles.neoBtnPrimary}>သိမ်းမည်</button></div>
            </form>
          )}
          <div className="grid gap-4 pb-10">
            {expenses.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e => (
              <div key={e.id} className={`${styles.neoCard} p-4 flex justify-between items-center`}>
                <div><h3 className="font-bold text-lg">{e.name}</h3><p className="text-sm text-cyan-100/70">{e.amount.toLocaleString()} Ks | {e.deductProfit ? 'Deduct' : 'No Deduct'}</p></div>
                <button onClick={()=>deleteItem(e.id)} className="p-3 text-rose-400 hover:text-rose-300 bg-white/5 rounded-lg"><i className="fas fa-trash-alt"></i></button>
              </div>
            ))}
            {expenses.length === 0 && <p className="text-center py-8 font-bold text-white/50">အသုံးစရိတ် မရှိသေးပါ။</p>}
          </div>
        </div>
      );
    };

    // ==========================================
    // REPORT TAB
    // ==========================================
    const ReportTab = ({ products, sales, preorders, expenses }) => {
      const [filter, setFilter] = useState('daily'); 
      const filteredData = useMemo(() => {
        const now = new Date(); 
        const isSameDay = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
        const isSameMonth = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth();
        const isSameYear = (d1, d2) => d1.getFullYear() === d2.getFullYear();

        const validSales = sales.filter(s => { const d = new Date(s.date); return filter==='daily'?isSameDay(d,now) : filter==='monthly'?isSameMonth(d,now) : filter==='yearly'?isSameYear(d,now) : true; });
        const validPreorders = preorders.filter(po => { 
          const d = new Date(po.orderDate); 
          const isTimeMatch = filter==='daily'?isSameDay(d,now) : filter==='monthly'?isSameMonth(d,now) : filter==='yearly'?isSameYear(d,now) : true;
          return isTimeMatch && (po.orderStatus === 'Completed' || po.orderStatus === 'Sent' || po.paymentStatus === 'Paid'); 
        });
        const validExpenses = expenses.filter(e => { 
          if(!e.deductProfit) return false; 
          const d = new Date(e.date); 
          return filter==='daily'?isSameDay(d,now) : filter==='monthly'?isSameMonth(d,now) : filter==='yearly'?isSameYear(d,now) : true; 
        });

        let totalSalePrice = 0; let totalCost = 0; let totalServiceFee = 0; let itemSalesCount = {};
        
        validSales.forEach(s => {
          totalServiceFee += Number(s.serviceFee || 0);
          s.items.forEach(i => { totalSalePrice += Math.round(i.price * i.qty); totalCost += Math.round(i.cost * i.qty); itemSalesCount[i.productId] = (itemSalesCount[i.productId] || 0) + Number(i.qty); });
        });
        
        validPreorders.forEach(po => {
          totalServiceFee += Number(po.serviceFee || 0);
          totalSalePrice += Math.round(po.price * po.quantity);
          totalCost += Math.round(po.cost * po.quantity);
          itemSalesCount[po.productId] = (itemSalesCount[po.productId] || 0) + Number(po.quantity);
        });

        const totalExpense = validExpenses.reduce((sum, e) => sum + Number(e.amount), 0);
        const netProfit = (totalSalePrice - totalCost) + totalServiceFee - totalExpense;
        const bestSellers = Object.keys(itemSalesCount).map(id => { const p = products.find(x => x.id === id); return { name: p ? p.name : 'Unknown', qty: itemSalesCount[id] }; }).sort((a,b) => b.qty - a.qty).slice(0, 10);
        return { totalSalePrice: totalSalePrice + totalServiceFee, netProfit, bestSellers };
      }, [sales, preorders, expenses, products, filter]);

      const inventoryAsset = useMemo(() => products.reduce((sum, p) => sum + Math.round(p.cost * p.quantity), 0), [products]);

      return (
        <div className="space-y-6 animate-in fade-in pb-10">
          <h2 className={styles.headerText}>အစီရင်ခံစာ (Report)</h2>
          <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
            {['daily', 'monthly', 'yearly', 'grand'].map(f => (
              <button key={f} onClick={() => setFilter(f)} className={`${styles.neoBtn} px-6 py-2 whitespace-nowrap uppercase ${filter === f ? 'text-cyan-300 bg-white/20 border-cyan-400/50 shadow-[0_0_10px_rgba(34,211,238,0.3)]' : ''}`}>{f}</button>
            ))}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className={`${styles.neoCard} p-6 flex flex-col justify-center items-center text-center space-y-4 bg-gradient-to-br from-blue-900/40 to-slate-900/40`}>
              <h3 className="font-bold text-cyan-100/80 uppercase tracking-widest text-sm">Total Revenue</h3>
              <p className="text-4xl font-black text-cyan-300 drop-shadow-md">{filteredData.totalSalePrice.toLocaleString()}</p>
              <h3 className="font-bold text-cyan-100/80 uppercase tracking-widest text-sm pt-4 border-t border-white/10 w-full">Net Profit</h3>
              <p className="text-4xl font-black text-emerald-400 drop-shadow-md">{filteredData.netProfit.toLocaleString()}</p>
            </div>
            <div className={`${styles.neoCard} p-6`}>
              <h3 className="font-bold mb-4 border-b border-white/10 pb-2 text-cyan-100">Best Selling (Top 10)</h3>
              <div className="space-y-2">
                {filteredData.bestSellers.length === 0 && <p className="text-white/50 text-sm font-bold">No Data</p>}
                {filteredData.bestSellers.map((b, i) => <div key={i} className="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5"><span className="font-bold text-white">{i+1}. {b.name}</span><span className="bg-cyan-500/20 text-cyan-300 border border-cyan-500/30 px-3 py-1 rounded-lg text-sm font-bold">{b.qty} sold</span></div>)}
              </div>
            </div>
            <div className={`${styles.neoCard} p-6 md:col-span-2 flex justify-between items-center bg-gradient-to-r from-cyan-900/30 to-blue-900/30`}>
              <h3 className="text-xl font-bold text-cyan-100">Inventory Asset</h3>
              <p className="text-3xl font-black text-white drop-shadow-sm">{inventoryAsset.toLocaleString()} Ks</p>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // SALE TAB
    // ==========================================
    const SaleTab = ({ products, customersWithData, sales, userId, showAlert, showConfirm }) => {
      const getLocalDateString = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
      const [cart, setCart] = useState([]);
      const [selectedProduct, setSelectedProduct] = useState('');
      const [qty, setQty] = useState('1'); 
      const [customerId, setCustomerId] = useState('');
      const [saleDate, setSaleDate] = useState(getLocalDateString());
      const [serviceFee, setServiceFee] = useState(0);
      const [payAmountInput, setPayAmountInput] = useState('');
      
      const itemsTotal = cart.reduce((sum, item) => sum + Math.round(item.price * item.qty), 0);
      const grandTotal = itemsTotal + Number(serviceFee || 0);
      const payAmount = Number(payAmountInput || 0); 
      const balance = grandTotal - payAmount;

      const addToCart = () => {
        const p = products.find(x => x.id === selectedProduct);
        if (!p) return;
        const quantityToAdd = parseFloat(qty);
        if (isNaN(quantityToAdd) || quantityToAdd <= 0) return showAlert('အရေအတွက် မှန်ကန်စွာ ထည့်ပါ။');
        if (p.quantity < quantityToAdd) return showAlert('စတော့စာရင်းတွင် ပစ္စည်းအရေအတွက် မလောက်ပါ!');
        
        const existing = cart.find(c => c.productId === p.id);
        if (existing) {
          if (p.quantity < existing.qty + quantityToAdd) return showAlert('စတော့စာရင်းတွင် ပစ္စည်းအရေအတွက် မလောက်ပါ!');
          setCart(cart.map(c => c.productId === p.id ? { ...c, qty: c.qty + quantityToAdd } : c));
        } else setCart([...cart, { productId: p.id, name: p.name, price: p.price, cost: p.cost, qty: quantityToAdd }]);
        setQty('1'); setSelectedProduct('');
      };

      const handleCheckout = async () => {
        if (!customerId) return showAlert('Customer ရွေးချယ်ပါ။');
        if (cart.length === 0) return showAlert('ခြင်းထဲသို့ ပစ္စည်းထည့်ပါ။');
        try {
          const selectedDateObj = new Date(saleDate); const now = new Date(); selectedDateObj.setHours(now.getHours(), now.getMinutes(), now.getSeconds());
          const safeUserId = String(userId);
          const saleData = {
            customerId, customerName: customersWithData.find(c => c.id === customerId)?.name || 'Unknown',
            date: selectedDateObj.toISOString(), items: cart, itemsTotal, serviceFee: Number(serviceFee),
            grandTotal, payAmount, balance: balance > 0 ? balance : 0, status: (balance <= 0 && grandTotal > 0) ? 'Paid' : 'Unpaid'
          };

          for (let item of cart) {
            const p = products.find(x => x.id === item.productId);
            if (p) await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/products`).doc(p.id).update({ quantity: Number((p.quantity - item.qty).toFixed(3)) });
          }
          await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/sales`).add(saleData);
          setCart([]); setCustomerId(''); setServiceFee(0); setPayAmountInput(''); showAlert("ရောင်းချပြီးပါပြီ။");
        } catch (err) { showAlert(err.message); }
      };

      const deleteSale = (sale) => showConfirm('မှတ်တမ်းကို ဖျက်ပြီး ပစ္စည်းများကို ပြန်ပေါင်းထည့်မလား?', async () => {
        try {
          const safeUserId = String(userId);
          for (let item of sale.items) {
            const p = products.find(x => x.id === item.productId);
            if (p) await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/products`).doc(p.id).update({ quantity: Number((p.quantity + item.qty).toFixed(3)) });
          }
          await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/sales`).doc(sale.id).delete();
        } catch (err) { showAlert(err.message); }
      });

      return (
        <div className="space-y-6 animate-in fade-in pb-10">
          <h2 className={styles.headerText}>အရောင်း (Sale)</h2>
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div className="lg:col-span-7 space-y-4">
              <div className={`${styles.neoCard} p-6 space-y-5`}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <input type="date" value={saleDate} onChange={e=>setSaleDate(e.target.value)} className={styles.neoInput} />
                  <select value={customerId} onChange={e=>setCustomerId(e.target.value)} className={styles.neoInput}>
                    <option value="">-- Customer ရွေးပါ --</option>
                    {customersWithData.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div className="flex flex-col gap-2 pt-2 border-t border-white/10">
                  <div className="flex gap-2">
                    <select value={selectedProduct} onChange={e=>setSelectedProduct(e.target.value)} className={`${styles.neoInput} flex-1`}>
                      <option value="">-- ပစ္စည်းရွေးပါ --</option>
                      {products.map(p => <option key={p.id} value={p.id} disabled={p.quantity<=0}>{p.name} ({Number(p.quantity)}) - {p.price}Ks</option>)}
                    </select>
                    <input type="number" step="any" min="0" value={qty} onChange={e=>setQty(e.target.value)} className={`${styles.neoInput} w-24 text-center text-cyan-300`} />
                    <button onClick={addToCart} className={`${styles.neoBtnPrimary} px-4`}><i className="fas fa-plus"></i></button>
                  </div>
                  <div className="flex flex-wrap gap-2 mt-1">
                    <button onClick={()=>setQty('0.5')} className="text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white p-2 rounded-lg border border-white/20 shadow-sm transition-colors">၁/၂</button>
                    <button onClick={()=>setQty(String(Number((1/3).toFixed(3))))} className="text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white p-2 rounded-lg border border-white/20 shadow-sm transition-colors">၁/၃</button>
                    <button onClick={()=>setQty(String(Number((2/3).toFixed(3))))} className="text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white p-2 rounded-lg border border-white/20 shadow-sm transition-colors">၂/၃</button>
                    <button onClick={()=>setQty('0.25')} className="text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white p-2 rounded-lg border border-white/20 shadow-sm transition-colors">၁/၄</button>
                    <button onClick={()=>setQty('1')} className="text-[11px] font-bold bg-white/20 hover:bg-white/30 text-white p-2 rounded-lg border border-white/30 shadow-sm transition-colors">၁ ခု</button>
                  </div>
                </div>
                <div className="min-h-[150px] bg-slate-900/40 rounded-xl p-4 shadow-inner border border-white/5 overflow-y-auto custom-scrollbar">
                  {cart.map((c, i) => (
                    <div key={i} className="flex justify-between items-center mb-3 border-b border-white/10 pb-2">
                      <div className="flex flex-col"><span className="font-bold text-white text-sm">{c.name}</span><span className="text-xs text-cyan-200/60">{c.price} x {c.qty}</span></div>
                      <div className="flex items-center gap-4"><span className="font-bold text-cyan-300">{(Math.round(c.price * c.qty)).toLocaleString()}</span><button onClick={()=>removeCart(i)} className="text-rose-400 hover:text-rose-300 bg-white/5 p-1.5 rounded-lg"><i className="fas fa-trash-alt"></i></button></div>
                    </div>
                  ))}
                </div>
                <div className="bg-white/5 p-5 rounded-xl shadow-sm border border-white/10 space-y-3 font-bold">
                  <div className="flex justify-between text-cyan-100/70"><span>ပစ္စည်းတန်ဖိုး:</span> <span>{itemsTotal.toLocaleString()}</span></div>
                  <div className="flex justify-between items-center"><span className="text-cyan-100/70">ဝန်ဆောင်ခ:</span><input type="number" value={serviceFee} onChange={e=>setServiceFee(e.target.value)} className={`${styles.neoInput} w-32 py-1.5 h-10 text-right`} /></div>
                  <div className="flex justify-between items-center text-lg text-cyan-300 pt-3 border-t border-white/10"><span>ကျသင့်ငွေ:</span> <span className="text-2xl font-black">{grandTotal.toLocaleString()}</span></div>
                  <div className="flex justify-between items-center pt-2"><span className="text-emerald-400">ပေးသွင်းငွေ:</span><input type="number" value={payAmountInput} onChange={e=>setPayAmountInput(e.target.value)} className={`${styles.neoInput} w-32 py-1.5 h-10 text-right text-emerald-300 bg-emerald-900/20 border-emerald-500/30`} /></div>
                  <div className={`flex justify-between pt-2 ${balance <= 0 ? 'text-emerald-400' : 'text-amber-400'}`}><span>{balance <= 0 ? 'အခြေအနေ:' : 'အကြွေးကျန်:'}</span> <span className="text-xl">{balance <= 0 ? 'Paid' : balance.toLocaleString()}</span></div>
                </div>
                <button onClick={handleCheckout} className={`${styles.neoBtnPrimary} w-full h-14 text-lg mb-20 md:mb-0`}>ရောင်းချမည်</button>
              </div>
            </div>
            <div className="lg:col-span-5 max-h-[80vh] overflow-y-auto custom-scrollbar">
              <h3 className="font-bold text-xl mb-4 text-cyan-100"><i className="fas fa-history text-cyan-400"></i> မှတ်တမ်းများ</h3>
              <div className="space-y-4">
                {sales.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0, 15).map(s => (
                  <div key={s.id} className={`${styles.neoCard} p-4 border-l-4 ${s.status === 'Paid' ? 'border-l-emerald-400' : 'border-l-amber-400'}`}>
                    <div className="flex justify-between font-bold mb-2"><span>{s.customerName}</span><span className={s.status==='Paid'?'text-emerald-400':'text-amber-400'}>{s.status}</span></div>
                    <div className="text-sm space-y-1 mb-2 text-white/80">{s.items.map((i, idx) => <div key={idx} className="flex justify-between"><span>{i.name} <span className="text-[10px] bg-white/10 px-1 rounded text-cyan-300">x{i.qty}</span></span></div>)}</div>
                    <div className="flex justify-between items-end border-t border-white/10 pt-2"><div className="text-xs font-bold text-cyan-100">Total: {s.grandTotal.toLocaleString()} {s.balance > 0 && <span className="text-amber-400 block mt-1">Bal: {s.balance.toLocaleString()}</span>}</div><button onClick={()=>deleteSale(s)} className="text-rose-400 bg-white/5 p-2 rounded-lg hover:text-rose-300"><i className="fas fa-trash-alt"></i></button></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // PRE-ORDER TAB 
    // ==========================================
    const PreOrderTab = ({ products, customers, preorders, userId, showAlert, showConfirm }) => {
      const getTodayString = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
      
      const [view, setView] = useState('list'); 
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all'); 
      
      const defaultForm = {
        id: null, customerId: '', customerName: '', phone: '', productId: '', productName: '', price: 0, cost: 0, 
        quantity: '1', note: '', orderDate: getTodayString(), expectedDate: getTodayString(), 
        paymentStatus: 'Unpaid', payAmount: '', serviceFee: 0, orderStatus: 'Pending', isStockDeducted: false
      };
      const [form, setForm] = useState(defaultForm);

      const itemsTotal = Math.round((Number(form.price) || 0) * (Number(form.quantity) || 0));
      const grandTotal = itemsTotal + Number(form.serviceFee || 0);
      const balance = grandTotal - Number(form.payAmount || 0);

      const handleProductSelect = (e) => {
        const val = e.target.value;
        if(!val) return setForm({...form, productId: '', productName: '', price: 0, cost: 0});
        const p = products.find(x => x.id === val);
        setForm({...form, productId: p.id, productName: p.name, price: p.price, cost: p.cost});
      };

      const handleCustomerSelect = (e) => {
        const cid = e.target.value;
        if (!cid) return setForm({...form, customerId: '', customerName: '', phone: ''});
        const c = customers.find(x => x.id === cid);
        setForm({...form, customerId: c.id, customerName: c.name, phone: c.phone || c.phone1 || ''});
      };

      const handleSave = async (e) => {
        e.preventDefault();
        try {
          const safeUserId = String(userId);
          const ref = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/preorders`);
          
          let paymentDate = null;
          if (form.paymentStatus === 'Paid') paymentDate = new Date().toISOString();
          let currentOrderStat = form.id ? form.orderStatus : 'Pending';
          if (form.paymentStatus === 'Paid' && currentOrderStat === 'Sent') currentOrderStat = 'Completed';

          const data = {
            customerId: form.customerId, customerName: form.customerName, phone: form.phone,
            productId: form.productId, productName: form.productName, price: Number(form.price), cost: Number(form.cost),
            quantity: Number(form.quantity), note: form.note,
            orderDate: new Date(form.orderDate).toISOString(), expectedDate: new Date(form.expectedDate).toISOString(),
            paymentStatus: form.paymentStatus, payAmount: Number(form.payAmount), serviceFee: Number(form.serviceFee),
            grandTotal, balance: balance > 0 ? balance : 0,
            paymentDate: form.id ? form.paymentDate : paymentDate, 
            orderStatus: currentOrderStat, isStockDeducted: form.isStockDeducted
          };

          if (form.id) {
            if (form.paymentStatus === 'Paid' && form.paymentStatus !== form.paymentStatus) data.paymentDate = new Date().toISOString();
            await ref.doc(form.id).update(data);
          } else await ref.add(data);
          
          setView('list'); setForm(defaultForm); showAlert("Pre-Order သိမ်းဆည်းပြီးပါပြီ။");
        } catch (err) { showAlert(err.message); }
      };

      const updateOrderToSent = (po) => {
        showConfirm(`ပစ္စည်းပို့ပြီးကြောင်း မှတ်သားမည်လား? (Inventory မှ ပစ္စည်းအရေအတွက် နုတ်သွားပါမည်)`, async () => {
          try {
            const safeUserId = String(userId);
            const poRef = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/preorders`).doc(po.id);
            const newStatus = po.paymentStatus === 'Paid' ? 'Completed' : 'Sent';
            
            if (!po.isStockDeducted && po.productId) {
               const p = products.find(x => x.id === po.productId);
               if (p) await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/products`).doc(po.productId).update({ quantity: Number((p.quantity - po.quantity).toFixed(3)) });
            }
            await poRef.update({ orderStatus: newStatus, isStockDeducted: true });
            showAlert("ပို့ဆောင်ပြီးကြောင်း မှတ်သားပြီး Inventory ကို Update လုပ်ပြီးပါပြီ။");
          } catch(e) { showAlert(e.message); }
        });
      };

      const deleteOrder = (po) => {
        showConfirm("ဤ Pre-Order အား ဖျက်သိမ်းမည် သေချာပါသလား? (ပို့ပြီးသားဖြစ်ပါက Inventory သို့ ပစ္စည်းပြန်ဝင်ပါမည်)", async () => {
          try { 
            if (po.isStockDeducted && po.productId) {
               const p = products.find(x => x.id === po.productId);
               if(p) await db.collection(`artifacts/${APP_ID}/users/${userId}/products`).doc(po.productId).update({ quantity: Number((p.quantity + po.quantity).toFixed(3)) });
            }
            await db.collection(`artifacts/${APP_ID}/users/${userId}/preorders`).doc(po.id).delete(); 
            showAlert("ဖျက်သိမ်းပြီးပါပြီ။"); 
          } catch(e) { showAlert(e.message); }
        });
      };

      const filteredOrders = useMemo(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        return preorders.filter(po => {
          const matchSearch = po.customerName.toLowerCase().includes(search.toLowerCase()) || po.productName.toLowerCase().includes(search.toLowerCase());
          if (!matchSearch) return false;
          const expDate = new Date(po.expectedDate); expDate.setHours(0,0,0,0);
          if (filter === 'paid') return po.paymentStatus === 'Paid';
          if (filter === 'unpaid') return po.paymentStatus === 'Unpaid';
          if (filter === 'today') return expDate.getTime() === today.getTime() && po.orderStatus !== 'Completed';
          if (filter === 'overdue') return expDate < today && po.orderStatus !== 'Completed' && po.orderStatus !== 'Sent';
          return true;
        }).sort((a, b) => new Date(a.expectedDate) - new Date(b.expectedDate));
      }, [preorders, search, filter]);

      const stats = useMemo(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        return preorders.reduce((acc, po) => {
          acc.total++;
          if (po.orderStatus === 'Pending') acc.pending++;
          if (po.paymentStatus === 'Paid') acc.paid++;
          if (po.paymentStatus === 'Unpaid') acc.unpaid++;
          const expDate = new Date(po.expectedDate); expDate.setHours(0,0,0,0);
          if (expDate < today && po.orderStatus !== 'Completed' && po.orderStatus !== 'Sent') acc.overdue++;
          return acc;
        }, { total: 0, pending: 0, paid: 0, unpaid: 0, overdue: 0 });
      }, [preorders]);

      const getDateBadge = (expectedDateString, status) => {
        if (status === 'Completed') return { color: 'bg-white/10 text-white border-white/20', icon: 'fa-check-double', text: 'Completed' };
        const today = new Date(); today.setHours(0,0,0,0); const expDate = new Date(expectedDateString); expDate.setHours(0,0,0,0);
        const diffDays = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return { color: 'bg-rose-500/20 text-rose-400 border-rose-500/50 animate-pulse', icon: 'fa-exclamation-triangle', text: `Overdue (${Math.abs(diffDays)}d)` };
        if (diffDays === 0) return { color: 'bg-amber-500/20 text-amber-300 border-amber-500/50 font-black', icon: 'fa-bell', text: 'Today' };
        if (diffDays === 1) return { color: 'bg-amber-500/10 text-amber-200 border-amber-500/30', icon: 'fa-clock', text: 'Tomorrow' };
        return { color: 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40', icon: 'fa-calendar-alt', text: `In ${diffDays}d` };
      };

      if (view === 'form') {
        return (
          <div className="space-y-6 animate-in fade-in zoom-in">
            <div className="flex items-center gap-4"><button onClick={() => setView('list')} className={`${styles.neoBtn} !p-3 rounded-full`}><i className="fas fa-arrow-left"></i></button><h2 className={styles.headerText}>{form.id ? 'Pre-Order ပြင်ဆင်ရန်' : 'Pre-Order အသစ်'}</h2></div>
            <form onSubmit={handleSave} className={`${styles.neoCard} p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-6 relative`}>
              <div className="md:col-span-2 border-b border-white/10 pb-2"><h3 className="font-bold text-cyan-300"><i className="fas fa-user"></i> ဖောက်သည်အချက်အလက်</h3></div>
              <select required value={form.customerId} onChange={handleCustomerSelect} className={styles.neoInput}><option value="">-- Customer ရွေးပါ --</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
              <input placeholder="ဖုန်းနံပါတ်" value={form.phone} onChange={e=>setForm({...form, phone: e.target.value})} className={styles.neoInput} />
              
              <div className="md:col-span-2 border-b border-white/10 pb-2 pt-4"><h3 className="font-bold text-cyan-300"><i className="fas fa-box"></i> မှာယူမည့်ပစ္စည်း</h3></div>
              <select required value={form.productId} onChange={handleProductSelect} className={styles.neoInput} disabled={form.orderStatus !== 'Pending'}><option value="">-- Inventory မှ ပစ္စည်းရွေးပါ --</option>{products.map(p => <option key={p.id} value={p.id}>{p.name} (Price: {p.price})</option>)}</select>
              <input required type="number" step="any" min="0" placeholder="အရေအတွက်" value={form.quantity} onChange={e=>setForm({...form, quantity: e.target.value})} className={styles.neoInput} disabled={form.orderStatus !== 'Pending'} />
              <div className="md:col-span-2"><textarea placeholder="မှတ်ချက်..." value={form.note} onChange={e=>setForm({...form, note: e.target.value})} className={`${styles.neoInput} h-20`} /></div>

              <div className="md:col-span-2 border-b border-white/10 pb-2 pt-4"><h3 className="font-bold text-cyan-300"><i className="fas fa-calendar-check"></i> ငွေစာရင်း & ရက်စွဲ</h3></div>
              <div className="space-y-2"><label className="text-xs font-bold text-cyan-100/70 ml-2">မှာယူသည့်ရက် *</label><input required type="date" value={form.orderDate} onChange={e=>setForm({...form, orderDate: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-xs font-bold text-cyan-100/70 ml-2">ပို့ရမည့်ရက် *</label><input required type="date" value={form.expectedDate} onChange={e=>setForm({...form, expectedDate: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-xs font-bold text-cyan-100/70 ml-2">Service Fee</label><input type="number" value={form.serviceFee} onChange={e=>setForm({...form, serviceFee: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-xs font-bold text-cyan-100/70 ml-2">ပေးသွင်းငွေ (Pay Amount)</label><input type="number" step="any" value={form.payAmount} onChange={e=>setForm({...form, payAmount: e.target.value})} className={`${styles.neoInput} bg-emerald-900/20 border-emerald-500/30 text-emerald-300`} /></div>
              
              <div className="md:col-span-2 bg-slate-900/50 p-5 rounded-2xl shadow-inner border border-white/5 font-bold mt-2">
                <div className="flex justify-between text-lg text-cyan-300 mb-2"><span>စုစုပေါင်း (Grand Total):</span><span>{grandTotal.toLocaleString()} Ks</span></div>
                <div className="flex justify-between text-cyan-100/50 text-sm mb-3"><span>ပေးပြီး:</span><span>{Number(form.payAmount||0).toLocaleString()} Ks</span></div>
                <div className={`flex justify-between text-xl ${balance > 0 ? 'text-amber-400' : 'text-emerald-400'} pt-3 border-t border-white/10`}><span>{balance > 0 ? 'အကြွေးကျန်:' : 'အခြေအနေ:'}</span><span>{balance > 0 ? balance.toLocaleString() + ' Ks' : 'Paid'}</span></div>
              </div>

              {/* Added bottom margin to clear mobile menu */}
              <div className="md:col-span-2 flex flex-col md:flex-row gap-4 mt-6 mb-28 md:mb-6">
                <button type="button" onClick={() => setView('list')} className={`${styles.neoBtn} flex-1 text-white py-4 text-lg`}>မလုပ်တော့ပါ</button>
                <button type="submit" className={`${styles.neoBtnPrimary} flex-1 py-4 text-lg`}>သိမ်းမည်</button>
              </div>
            </form>
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-in fade-in pb-10">
          <div className="flex flex-col md:flex-row justify-between gap-4 items-start md:items-center"><h2 className={styles.headerText}>Pre-Order Management</h2><button onClick={()=>{ setForm(defaultForm); setView('form'); }} className={styles.neoBtnPrimary}><i className="fas fa-plus"></i> New Pre-Order</button></div>
          
          {/* Dashboards */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div className="bg-white/5 p-4 rounded-2xl border border-white/10 flex flex-col items-center justify-center"><span className="text-3xl font-black text-white">{stats.total}</span><span className="text-[10px] font-bold text-white/50 uppercase">Total Orders</span></div>
            <div className="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20 flex flex-col items-center justify-center"><span className="text-3xl font-black text-blue-400">{stats.pending}</span><span className="text-[10px] font-bold text-blue-300/70 uppercase">Pending</span></div>
            <div className="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20 flex flex-col items-center justify-center"><span className="text-3xl font-black text-emerald-400">{stats.paid}</span><span className="text-[10px] font-bold text-emerald-300/70 uppercase">Paid</span></div>
            <div className="bg-amber-500/10 p-4 rounded-2xl border border-amber-500/20 flex flex-col items-center justify-center"><span className="text-3xl font-black text-amber-400">{stats.unpaid}</span><span className="text-[10px] font-bold text-amber-300/70 uppercase">Unpaid</span></div>
            <div className="bg-rose-500/10 p-4 rounded-2xl border border-rose-500/20 flex flex-col items-center justify-center col-span-2 md:col-span-1"><span className="text-3xl font-black text-rose-400">{stats.overdue}</span><span className="text-[10px] font-bold text-rose-300/70 uppercase animate-pulse">Overdue</span></div>
          </div>

          <div className="flex flex-col md:flex-row gap-4">
            <div className="relative flex-1"><i className="fas fa-search absolute left-4 top-5 text-cyan-300"></i><input placeholder="Customer သို့ Product ဖြင့်ရှာရန်..." className={`${styles.neoInput} pl-12`} value={search} onChange={e=>setSearch(e.target.value)} /></div>
            <select className={`${styles.neoInput} md:w-48 font-bold`} value={filter} onChange={e=>setFilter(e.target.value)}><option value="all">All Orders</option><option value="paid">Paid Only</option><option value="unpaid">Unpaid Only</option><option value="today">Today's Delivery</option><option value="overdue">Overdue Alerts</option></select>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {filteredOrders.length === 0 && <p className="col-span-full text-center py-12 text-white/50 font-bold">မှတ်တမ်း မရှိသေးပါ။</p>}
            {filteredOrders.map(po => {
              const dBadge = getDateBadge(po.expectedDate, po.orderStatus);
              return (
                <div key={po.id} className={`${styles.neoCard} flex flex-col`}>
                  <div className="p-4 border-b border-white/10 flex justify-between items-start bg-white/5">
                    <div><h3 className="font-extrabold text-lg text-cyan-100 leading-tight">{po.customerName}</h3><p className="text-[11px] font-bold text-white/50"><i className="fas fa-phone mr-1"></i> {po.phone || "-"}</p></div>
                    <div className="flex flex-col items-end gap-1"><span className={`px-2 py-1 rounded text-[10px] font-black uppercase tracking-wider ${po.orderStatus === 'Pending' ? 'bg-blue-500/20 text-blue-300 border border-blue-500/30' : po.orderStatus === 'Sent' ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30' : 'bg-white/10 text-white/80 border border-white/20'}`}>{po.orderStatus}</span><span className={`px-2 py-0.5 rounded-full text-[10px] font-bold flex items-center gap-1 shadow-sm border ${dBadge.color}`}><i className={`fas ${dBadge.icon}`}></i> {dBadge.text}</span></div>
                  </div>
                  <div className="p-4 flex-1 space-y-3">
                    <div className="flex justify-between items-center"><div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-cyan-400 block shadow-[0_0_8px_cyan]"></span><span className="font-bold text-white">{po.productName}</span></div><span className="bg-white/10 px-2 py-0.5 rounded text-xs font-bold border border-white/10 text-cyan-300">Qty: {po.quantity}</span></div>
                    <div className="grid grid-cols-2 gap-2 text-xs font-bold text-white/70 bg-black/20 p-2 rounded-xl border border-white/5"><div><i className="fas fa-calendar-plus text-cyan-500 w-4"></i> Ord: {new Date(po.orderDate).toLocaleDateString('en-GB')}</div><div><i className="fas fa-truck text-emerald-400 w-4"></i> Exp: {new Date(po.expectedDate).toLocaleDateString('en-GB')}</div></div>
                    <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10">
                      <div className="flex flex-col"><span className="text-[10px] uppercase font-bold text-white/50 mb-0.5">Grand Total</span><span className={`font-black ${po.balance <= 0 ? 'text-emerald-400' : 'text-amber-400'}`}>{po.grandTotal?.toLocaleString() || 0} Ks {po.balance > 0 && <span className="text-amber-300/70 block text-xs">(Bal: {po.balance.toLocaleString()})</span>}</span></div>
                      {po.isStockDeducted && <span className="text-[9px] text-emerald-400/80 font-bold"><i className="fas fa-check-circle"></i> Stock Deducted</span>}
                    </div>
                  </div>
                  <div className="p-3 border-t border-white/10 bg-black/20 flex justify-between items-center gap-2">
                    <div className="flex gap-2"><button onClick={()=> { setForm({...po, orderDate: po.orderDate.split('T')[0], expectedDate: po.expectedDate.split('T')[0]}); setView('form'); }} className="w-9 h-9 flex items-center justify-center bg-blue-500/20 text-blue-300 border border-blue-500/30 rounded-xl hover:bg-blue-500/40"><i className="fas fa-edit text-sm"></i></button><button onClick={()=> deleteOrder(po)} className="w-9 h-9 flex items-center justify-center bg-rose-500/20 text-rose-400 border border-rose-500/30 rounded-xl hover:bg-rose-500/40"><i className="fas fa-trash text-sm"></i></button></div>
                    <div className="flex gap-2">
                      {po.orderStatus === 'Pending' && <button onClick={()=>updateOrderToSent(po)} className="px-3 py-2 bg-emerald-500/80 text-white font-bold text-xs rounded-xl hover:bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]"><i className="fas fa-paper-plane"></i> Mark Sent</button>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ==========================================
    // CUSTOMER TAB 
    // ==========================================
    const CustomerSection = ({ t, customers, sales, preorders, userId, showAlert, showConfirm }) => {
      const [view, setView] = useState('list'); 
      const [search, setSearch] = useState('');
      const [sort, setSort] = useState('name');
      const [form, setForm] = useState({ id: null, name: '', phone: '', address: '', note: '' });
      const [selectedId, setSelectedId] = useState(null);
      const [payAmt, setPayAmt] = useState('');

      const processedCustomers = useMemo(() => {
        return customers.map(c => {
          const cSales = sales.filter(s => s.customerId === c.id).map(s=>({...s, type: 'Sale'}));
          const cPreorders = preorders.filter(po => po.customerId === c.id).map(po=>({...po, type: 'Pre-Order'}));
          const combinedHistory = [...cSales, ...cPreorders].sort((a,b)=>new Date(b.date || b.orderDate) - new Date(a.date || a.orderDate));
          const balance = combinedHistory.reduce((sum, item) => sum + (Number(item.balance) || 0), 0);
          const totalSpent = combinedHistory.reduce((sum, item) => sum + (Number(item.grandTotal) || 0), 0);
          return { ...c, balance, totalSpent, count: combinedHistory.length, history: combinedHistory };
        }).filter(c => c.name.toLowerCase().includes(search.toLowerCase()))
          .sort((a,b) => sort === 'name' ? a.name.localeCompare(b.name) : b.balance - a.balance);
      }, [customers, sales, preorders, search, sort]);

      const selectedCustomer = useMemo(() => processedCustomers.find(c => c.id === selectedId), [processedCustomers, selectedId]);

      const handleSave = async (e) => {
        e.preventDefault();
        try {
          const safeUserId = String(userId);
          const data = { name: form.name, phone: form.phone, address: form.address, note: form.note };
          if (form.id) await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/customers`).doc(form.id).update(data);
          else await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/customers`).add(data);
          setView('list'); setForm({ id: null, name: '', phone: '', address: '', note: '' });
          showAlert("Customer သိမ်းဆည်းပြီးပါပြီ။");
        } catch (err) { showAlert(err.message); }
      };

      const handlePayment = async () => {
        const amt = parseFloat(payAmt);
        if (isNaN(amt) || amt <= 0) return showAlert("ငွေပမာဏ မှန်ကန်စွာထည့်ပါ။");
        if (amt > selectedCustomer.balance) return showAlert("ပေးချေငွေသည် အကြွေးထက် များနေပါသည်။");

        showConfirm(`${amt.toLocaleString()} ကျပ် ငွေချေရန် သေချာပါသလား?`, async () => {
          try {
            const safeUserId = String(userId);
            let remaining = amt;
            const unpaids = selectedCustomer.history.filter(s => (s.status === 'Unpaid' || s.paymentStatus === 'Unpaid' || s.balance > 0) && s.balance > 0)
                            .sort((a,b)=>new Date(a.date || a.orderDate) - new Date(b.date || b.orderDate));
            
            for (let item of unpaids) {
              if (remaining <= 0) break;
              const canPay = Math.min(remaining, item.balance);
              const newBalance = Number((item.balance - canPay).toFixed(2));
              const newPayAmount = Number(((item.payAmount || 0) + canPay).toFixed(2));
              
              if (item.type === 'Sale') {
                 await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/sales`).doc(item.id).update({
                   balance: newBalance, payAmount: newPayAmount, status: newBalance <= 0 ? 'Paid' : 'Unpaid'
                 });
              } else {
                 let orderStat = item.orderStatus;
                 if (newBalance <= 0 && orderStat === 'Sent') orderStat = 'Completed';
                 await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/preorders`).doc(item.id).update({
                   balance: newBalance, payAmount: newPayAmount, paymentStatus: newBalance <= 0 ? 'Paid' : 'Unpaid',
                   orderStatus: orderStat, paymentDate: newBalance <= 0 ? new Date().toISOString() : item.paymentDate
                 });
              }
              remaining -= canPay;
            }
            setPayAmt(''); showAlert("ငွေချေမှု အောင်မြင်ပါသည်။");
          } catch (err) { showAlert(err.message); }
        });
      };

      if (view === 'form') return (
        <div className="space-y-6 animate-in fade-in zoom-in">
          <div className="flex items-center gap-4"><button onClick={()=>setView('list')} className={`${styles.neoBtn} !p-3 rounded-full`}><i className="fas fa-arrow-left"></i></button><h2 className={styles.headerText}>{form.id ? t.edit : t.add}</h2></div>
          <form onSubmit={handleSave} className={`${styles.neoCard} p-6 space-y-5 relative`}>
            <div className="space-y-1"><label className="text-xs font-bold text-cyan-100/70 ml-2">ဖောက်သည်အမည် *</label><input required className={styles.neoInput} value={form.name} onChange={e=>setForm({...form, name: e.target.value})} /></div>
            <div className="space-y-1"><label className="text-xs font-bold text-cyan-100/70 ml-2">ဖုန်းနံပါတ်</label><input className={styles.neoInput} value={form.phone} onChange={e=>setForm({...form, phone: e.target.value})} /></div>
            <div className="space-y-1"><label className="text-xs font-bold text-cyan-100/70 ml-2">လိပ်စာ</label><input className={styles.neoInput} value={form.address} onChange={e=>setForm({...form, address: e.target.value})} /></div>
            <div className="space-y-1"><label className="text-xs font-bold text-cyan-100/70 ml-2">မှတ်ချက်</label><textarea className={`${styles.neoInput} h-24`} value={form.note} onChange={e=>setForm({...form, note: e.target.value})} /></div>
            <div className="flex flex-col md:flex-row gap-4 pt-4 mb-24 md:mb-6">
              <button type="button" onClick={()=>setView('list')} className={`${styles.neoBtn} flex-1 py-4 text-lg text-white`}>{t.cancel}</button>
              <button type="submit" className={`${styles.neoBtnPrimary} flex-1 py-4 text-lg`}>{t.save}</button>
            </div>
          </form>
        </div>
      );

      if (view === 'detail' && selectedCustomer) return (
        <div className="space-y-6 pb-10 animate-in fade-in slide-in-from-right-4">
          <div className="flex items-center gap-4"><button onClick={()=>setView('list')} className={`${styles.neoBtn} !p-3 rounded-full`}><i className="fas fa-arrow-left"></i></button><h2 className={styles.headerText}>{selectedCustomer.name}</h2></div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className={`${styles.neoCard} p-6 flex flex-col items-center text-center`}>
              <div className="w-20 h-20 bg-cyan-500/20 rounded-full flex items-center justify-center text-cyan-300 text-3xl mb-4 font-black shadow-[0_0_15px_rgba(34,211,238,0.3)]">{selectedCustomer.name.charAt(0)}</div>
              <p className="font-bold text-lg mb-1 text-white">{selectedCustomer.phone || "No Phone"}</p>
              <p className="text-xs text-white/50 mb-4">{selectedCustomer.address || "No Address"}</p>
              <div className="flex gap-2 w-full"><button onClick={()=>{ setForm(selectedCustomer); setView('form'); }} className={`${styles.neoBtn} flex-1 text-sm text-blue-300 border-blue-400/30`}><i className="fas fa-edit"></i> {t.edit}</button><button onClick={()=>showConfirm("အချက်အလက်အားလုံး ဖျက်မည် သေချာပါသလား?", async () => { await db.collection(`artifacts/${APP_ID}/users/${userId}/customers`).doc(selectedCustomer.id).delete(); setView('list'); })} className={`${styles.neoBtn} flex-1 text-rose-400 border-rose-400/30 text-sm`}><i className="fas fa-trash"></i> {t.delete}</button></div>
            </div>
            <div className={`${styles.neoCard} p-6 flex flex-col justify-between`}>
              <div className="space-y-4">
                <div className="flex justify-between items-center"><span className="text-white/70 text-sm font-bold">ဝယ်ယူမှု (စုစုပေါင်း):</span><span className="font-black text-white">{selectedCustomer.totalSpent.toLocaleString()} Ks</span></div>
                <div className="flex justify-between items-center"><span className="text-white/70 text-sm font-bold">အကြိမ်ရေ:</span><span className="font-black text-cyan-300">{selectedCustomer.count} ကြိမ်</span></div>
                <div className="pt-4 border-t border-white/10"><p className="text-xs font-bold text-white/50 uppercase mb-1">စုစုပေါင်း အကြွေးကျန်</p><p className={`text-3xl font-black ${selectedCustomer.balance > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{selectedCustomer.balance.toLocaleString()} Ks</p></div>
              </div>
              {selectedCustomer.balance > 0 && (
                <div className="mt-6 flex flex-col gap-2 bg-black/20 p-4 rounded-xl border border-white/10 shadow-inner">
                  <p className="text-xs font-bold text-cyan-100/70 mb-1">ငွေချေရန် (အဟောင်းမှစ၍ ဖြတ်မည်)</p>
                  <div className="flex gap-2"><input type="number" placeholder="ငွေချေရန်..." className={`${styles.neoInput} !p-3 !text-sm`} value={payAmt} onChange={e=>setPayAmt(e.target.value)} /><button onClick={handlePayment} className={`${styles.neoBtnPrimary} !p-3`}><i className="fas fa-check"></i></button></div>
                </div>
              )}
            </div>
            <div className={`${styles.neoCard} md:col-span-1 p-6 h-[400px] flex flex-col`}>
              <h3 className="font-bold border-b border-white/10 pb-3 mb-4 text-cyan-100"><i className="fas fa-history text-cyan-400"></i> ဘေလ်မှတ်တမ်းများ</h3>
              <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2">
                {selectedCustomer.history.length === 0 && <p className="text-white/50 text-center font-bold text-sm mt-10">ဝယ်ယူထားခြင်း မရှိသေးပါ။</p>}
                {selectedCustomer.history.map(s => (
                  <div key={s.id} className="p-3 bg-white/5 rounded-2xl border border-white/10 text-sm">
                    <div className="flex justify-between items-center mb-1">
                      <span className={`px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider ${s.type==='Sale'?'bg-emerald-500/20 text-emerald-300':'bg-blue-500/20 text-blue-300'}`}>{s.type}</span>
                      <span className="font-bold text-white/80">{new Date(s.date || s.orderDate).toLocaleDateString()}</span>
                    </div>
                    <div className="flex justify-between font-bold mb-1 text-cyan-100"><span>Total:</span><span>{s.grandTotal.toLocaleString()}</span></div>
                    <div className="flex justify-between text-[10px] font-bold">
                      <span className={(s.status || s.paymentStatus) === 'Paid' ? 'text-emerald-400' : 'text-amber-400'}>{s.status || s.paymentStatus}</span>
                      {s.balance > 0 && <span className="text-amber-300/80">Bal: {s.balance.toLocaleString()}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="space-y-6 animate-in fade-in pb-10">
          <div className="flex flex-col md:flex-row justify-between gap-4"><h2 className={styles.headerText}>{t.customer} စာရင်း</h2><button onClick={()=>{ setForm({id:null,name:'',phone:'',address:'',note:''}); setView('form'); }} className={styles.neoBtnPrimary}><i className="fas fa-plus"></i> {t.add}</button></div>
          <div className="flex flex-col md:flex-row gap-4">
            <div className="relative flex-1"><i className="fas fa-search absolute left-4 top-5 text-cyan-300"></i><input placeholder="နာမည်ဖြင့် ရှာဖွေရန်..." className={`${styles.neoInput} pl-12`} value={search} onChange={e=>setSearch(e.target.value)} /></div>
            <select className={`${styles.neoInput} md:w-48 font-bold`} value={sort} onChange={e=>setSort(e.target.value)}><option value="name">A-Z စီမည်</option><option value="balance">အကြွေးအများဆုံး</option></select>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {processedCustomers.map(c => (
              <div key={c.id} onClick={()=>{ setSelectedId(c.id); setView('detail'); }} className={`${styles.neoCard} p-6 flex flex-col justify-between hover:-translate-y-1 transition-transform cursor-pointer group`}>
                <div className="flex justify-between items-start mb-4">
                  <div><h3 className="text-xl font-bold text-cyan-100 group-hover:text-cyan-300 transition-colors">{c.name}</h3><p className="text-xs text-white/50 font-bold mt-1"><i className="fas fa-phone mr-1"></i> {c.phone || "-"}</p></div>
                  <div className="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-cyan-300"><i className="fas fa-chevron-right"></i></div>
                </div>
                <div className="pt-4 border-t border-white/10 flex justify-between items-end">
                  <div><p className="text-[10px] font-bold text-white/50 uppercase mb-1">အကြွေးလက်ကျန်</p><p className={`text-2xl font-black ${c.balance > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{c.balance.toLocaleString()}</p></div>
                  <div className="text-right"><p className="text-[10px] font-bold text-white/50 uppercase mb-1">အားပေးမှု</p><p className="font-bold text-sm text-cyan-100">{c.totalSpent.toLocaleString()} Ks</p></div>
                </div>
              </div>
            ))}
            {processedCustomers.length === 0 && <p className="col-span-full text-center py-20 font-bold text-white/50">ရှာဖွေမှုမှတ်တမ်း မရှိပါ။</p>}
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP WRAPPER
    // ==========================================
    const App = () => {
      const [user, setUser] = useState(null);
      const [lang, setLang] = useState('my');
      const [currentTab, setCurrentTab] = useState('preorder');
      const [init, setInit] = useState(false);
      const t = dict[lang];

      const [data, setData] = useState({ products: [], sales: [], customers: [], expenses: [], preorders: [] });
      const [dialog, setDialog] = useState({ open: false, type: 'alert', msg: '', onConfirm: null });

      const showAlert = (msg) => setDialog({ open: true, type: 'alert', msg, onConfirm: null });
      const showConfirm = (msg, onConfirm) => setDialog({ open: true, type: 'confirm', msg, onConfirm });

      useEffect(() => { auth.onAuthStateChanged(u => { setUser(u); setInit(true); }); }, []);

      useEffect(() => {
        if (!user) return;
        const safeId = String(user.uid);
        const unP = db.collection(`artifacts/${APP_ID}/users/${safeId}/products`).onSnapshot(s => setData(d => ({...d, products: s.docs.map(x=>({...x.data(), id: x.id}))})));
        const unS = db.collection(`artifacts/${APP_ID}/users/${safeId}/sales`).onSnapshot(s => setData(d => ({...d, sales: s.docs.map(x=>({...x.data(), id: x.id}))})));
        const unC = db.collection(`artifacts/${APP_ID}/users/${safeId}/customers`).onSnapshot(s => setData(d => ({...d, customers: s.docs.map(x=>({...x.data(), id: x.id}))})));
        const unE = db.collection(`artifacts/${APP_ID}/users/${safeId}/expenses`).onSnapshot(s => setData(d => ({...d, expenses: s.docs.map(x=>({...x.data(), id: x.id}))})));
        const unPO = db.collection(`artifacts/${APP_ID}/users/${safeId}/preorders`).onSnapshot(s => setData(d => ({...d, preorders: s.docs.map(x=>({...x.data(), id: x.id}))})));
        return () => { unP(); unS(); unC(); unE(); unPO(); };
      }, [user]);

      if (!init) return <div className="h-[100dvh] flex items-center justify-center font-black text-cyan-400 drop-shadow-lg text-xl">LOADING LUNA POS...</div>;
      if (!user) return <AuthScreen showAlert={showAlert} />;

      const tabs = [
        { id: 'preorder', icon: 'clipboard-list' },
        { id: 'customer', icon: 'users' },
        { id: 'sale', icon: 'shopping-cart' },
        { id: 'purchase', icon: 'box' },
        { id: 'expense', icon: 'file-invoice-dollar' },
        { id: 'report', icon: 'chart-pie' },
        { id: 'system', icon: 'cog' }
      ];

      return (
        <div className="flex flex-col md:flex-row h-[100dvh] w-full text-blue-50 overflow-hidden relative font-sans">
          
          {/* Desktop Sidebar (Glassmorphism) */}
          <nav className="hidden md:flex flex-col w-64 bg-slate-900/60 backdrop-blur-2xl border-r border-white/10 shadow-[4px_0_24px_rgba(0,0,0,0.5)] p-6 z-40">
            <h1 className={`${styles.headerText} mb-8 text-center`}>Luna POS</h1>
            <div className="space-y-2">
              {tabs.map(tab => (
                <button key={tab.id} onClick={()=>setCurrentTab(tab.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold transition-all ${currentTab === tab.id ? 'bg-cyan-500/20 text-cyan-300 border border-cyan-400/30 shadow-[0_0_15px_rgba(34,211,238,0.2)]' : 'text-cyan-100/60 hover:bg-white/10 hover:text-cyan-100'}`}>
                  <i className={`fas fa-${tab.icon} w-6 text-center`}></i> {t[tab.id] || tab.id}
                </button>
              ))}
            </div>
          </nav>

          {/* Main Content Area */}
          <main className="flex-1 h-full overflow-y-auto custom-scrollbar content-area">
            <div className="p-4 md:p-8 w-full max-w-7xl mx-auto h-full">
              {currentTab === 'preorder' && <PreOrderTab products={data.products} customers={data.customers} preorders={data.preorders} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
              {currentTab === 'customer' && <CustomerSection t={t} customers={data.customers} sales={data.sales} preorders={data.preorders} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
              {currentTab === 'sale' && <SaleTab products={data.products} customersWithData={data.customers} sales={data.sales} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
              {currentTab === 'purchase' && <PurchaseTab products={data.products} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
              {currentTab === 'expense' && <ExpenseTab expenses={data.expenses} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
              {currentTab === 'report' && <ReportTab products={data.products} sales={data.sales} preorders={data.preorders} expenses={data.expenses} />}
              {currentTab === 'system' && <SystemTab user={user} showAlert={showAlert} />}
            </div>
          </main>

          {/* Mobile Bottom Navigation (Glassmorphism) */}
          <nav className="md:hidden fixed bottom-0 left-0 w-full h-[75px] bg-slate-900/80 backdrop-blur-2xl flex overflow-x-auto custom-scrollbar border-t border-white/10 shadow-[0_-8px_24px_rgba(0,0,0,0.5)] z-50">
            {tabs.map(tab => (
              <button key={tab.id} onClick={()=>setCurrentTab(tab.id)} className={`flex flex-col items-center justify-center min-w-[75px] h-full flex-1 transition-all ${currentTab === tab.id ? 'text-cyan-300 bg-white/10 rounded-t-xl border-t-2 border-cyan-400' : 'text-cyan-100/50 hover:bg-white/5'}`}>
                <i className={`fas fa-${tab.icon} text-lg mb-1`}></i>
                <span className="text-[9px] font-bold">{t[tab.id] || tab.id}</span>
              </button>
            ))}
          </nav>

          {/* Global Dialog Modal (Glassmorphism) */}
          {dialog.open && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6 animate-in fade-in">
              <div className={`${styles.neoCard} p-8 max-w-sm w-full text-center shadow-[0_0_40px_rgba(0,0,0,0.8)] border border-white/20`}>
                <i className={`fas ${dialog.type==='confirm'?'fa-question-circle text-amber-400':'fa-info-circle text-cyan-400'} text-5xl mb-4 drop-shadow-md`}></i>
                <p className="font-bold text-white mb-8 whitespace-pre-wrap leading-relaxed">{dialog.msg}</p>
                <div className="flex gap-4">
                  {dialog.type === 'confirm' && <button onClick={()=>setDialog({...dialog, open:false})} className={`${styles.neoBtn} flex-1 text-white`}>ငြင်းမည်</button>}
                  <button onClick={async ()=>{ if(dialog.onConfirm) await dialog.onConfirm(); setDialog({...dialog, open:false}); }} className={`${styles.neoBtnPrimary} flex-1`}>အိုကေ</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
