        deductProfit: "အမြတ်ထဲမှ နုတ်မည်", date: "ရက်စွဲ", selectCustomer: "ဖောက်သည်ရွေးပါ",
        addToCart: "ခြင်းထဲထည့်မည်", payBalance: "လက်ကျန်ငွေရှင်းမည်",
        details: "မှတ်တမ်းကြည့်မည်", salesHistory: "ဝယ်ယူမှု မှတ်တမ်းများ", payNow: "ငွေချေမည်", paymentAmount: "ပေးသွင်းငွေ ပမာဏ"

        serviceFee: "Service Fee", payAmount: "Pay Amount", balance: "Balance",
        age: "Age", gender: "Gender", phone: "Phone", diagnosis: "Diagnosis",
        daily: "Daily", weekly: "Weekly", monthly: "Monthly", yearly: "Yearly", grandTotal: "Grand Total",
        bestSelling: "Best Selling", inventory: "Inventory Asset",

    // ==========================================
    // SUB-COMPONENTS
    // ==========================================
    const AuthScreen = ({ handleAuth, handleGuest, t, lang, setLang }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');

        <div className="bg-gray-50 h-[100dvh] w-full flex items-center justify-center p-4">
          <div className={`${styles.neoCard} p-8 w-full max-w-md shadow-lg border-gray-200`}>
            <div className="flex justify-between items-center mb-8">
              <h1 className="text-3xl font-black text-black">Nay N Nay<br/>POS</h1>
              <button onClick={() => setLang(lang === 'my' ? 'en' : 'my')} className="text-xs text-black font-bold bg-gray-100 border border-gray-300 px-3 py-1 rounded-full">{t.langSwitch}</button>
            </div>
            <form onSubmit={(e) => handleAuth(e, isLogin, email, password)} className="space-y-6">
              <div><input type="email" placeholder={t.email} required className={styles.neoInput} value={email} onChange={e=>setEmail(e.target.value)} /></div>
              <div><input type="password" placeholder={t.password} required className={styles.neoInput} value={password} onChange={e=>setPassword(e.target.value)} /></div>
              <button type="submit" className={`${styles.neoBtnPrimary} w-full text-lg py-4`}>{isLogin ? t.login : t.signup}</button>
            </form>
            <div className="mt-6 flex flex-col gap-4 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-black font-bold hover:underline">{isLogin ? t.signup : t.login}</button>
              <div className="flex items-center gap-2"><hr className="flex-1 border-gray-300" /><span className="text-sm text-gray-400 font-bold">OR</span><hr className="flex-1 border-gray-300" /></div>
              <button onClick={handleGuest} className={`${styles.neoBtn} w-full text-black`}><i className="fas fa-user-plus text-xl"></i> {t.guestLogin}</button>
            </div>
          </div>
        </div>
      );
    };

    const SystemTab = ({ user, t, lang, setLang }) => (
      <div className="space-y-6">
        <h2 className={styles.headerText}>{t.system}</h2>
        <div className={`${styles.neoCard} p-6 space-y-4`}>
          <p className="font-bold text-lg text-black">Logged in as: <span className="font-normal">{user.isAnonymous ? "Guest User" : user.email}</span></p>
          <hr className="border-gray-200 my-4" />
          <div className="flex flex-col md:flex-row gap-4">
            <button onClick={() => auth.signOut()} className={`${styles.neoBtn} text-red-600 border-red-200 hover:bg-red-50 w-full md:w-auto px-6`}><i className="fas fa-sign-out-alt text-xl"></i> {t.logout}</button>
            <button onClick={() => setLang(lang === 'my' ? 'en' : 'my')} className={`${styles.neoBtn} w-full md:w-auto px-6`}><i className="fas fa-globe text-xl"></i> {t.langSwitch}</button>
          </div>
        </div>
      </div>
    );

    const PurchaseTab = ({ t, products, userId, showAlert, showConfirm }) => {
      const [search, setSearch] = useState('');
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ id: null, name: '', cost: '', price: '', qty: '', expDate: '' });

      const sortedProducts = useMemo(() => {
        return [...products].filter(p => (p.name || '').toLowerCase().includes(search.toLowerCase())).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      }, [products, search]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const data = { name: form.name, cost: Number(form.cost), price: Number(form.price), quantity: Number(form.qty), expiredDate: form.expDate };
          const safeUserId = String(userId);
          const productsRef = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/products`);
          
          if (form.id) await productsRef.doc(String(form.id)).update(data);
          else await productsRef.add(data);
          
          setShowForm(false); setForm({ id: null, name: '', cost: '', price: '', qty: '', expDate: '' });
          showAlert("အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။");
        } catch (err) { showAlert("Data သိမ်းဆည်းရာတွင် အမှားဖြစ်နေပါသည်: \n" + err.message); }
      };

      const deleteItem = (id) => { 
        if (!id) return;
        showConfirm('ဤပစ္စည်းကို စာရင်းမှ ဖယ်ရှားရန် သေချာပါသလား?', async () => {
          try { 
            await db.collection(`artifacts/${APP_ID}/users/${userId}/products`).doc(String(id)).delete(); 
            showAlert("အောင်မြင်စွာ ဖယ်ရှားပြီးပါပြီ။"); 
          } 
          catch (err) { showAlert("ဖျက်ရာတွင် အမှားဖြစ်နေပါသည်: \n" + err.message); }
        });
      };

      const getRowStyle = (p) => {
        const base = "bg-white rounded-2xl p-4 shadow-sm border flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ";
        if (!p.expiredDate) return base + "border-gray-200";
        const today = new Date(); const exp = new Date(p.expiredDate);
        const monthsDiff = (exp.getFullYear() - today.getFullYear()) * 12 + (exp.getMonth() - today.getMonth());
        const isLowQty = p.quantity < 10; const isExpiring = monthsDiff < 3 && monthsDiff >= 0;
        
        if (isLowQty && isExpiring) return base + "border-red-400 bg-red-50";
        if (isLowQty) return base + "border-orange-300 bg-orange-50";
        if (isExpiring) return base + "border-yellow-300 bg-yellow-50";
        return base + "border-gray-200";
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h2 className={styles.headerText}>{t.purchase} (ပစ္စည်းစာရင်း)</h2>
            <button onClick={() => setShowForm(!showForm)} className={styles.neoBtnPrimary}>{showForm ? t.cancel : <><i className="fas fa-plus text-xl"></i> {t.add}</>}</button>
          </div>
          {showForm && (
            <form onSubmit={handleSubmit} className={`${styles.neoCard} p-6 grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 border-black`}>
              <input required placeholder={t.name} value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder={t.cost} value={form.cost} onChange={e=>setForm({...form, cost: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder={t.price} value={form.price} onChange={e=>setForm({...form, price: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder={t.qty} value={form.qty} onChange={e=>setForm({...form, qty: e.target.value})} className={styles.neoInput} />
              <input required type="date" placeholder={t.expDate} value={form.expDate} onChange={e=>setForm({...form, expDate: e.target.value})} className={styles.neoInput} />
              <div className="md:col-span-2 flex justify-end"><button type="submit" className={`${styles.neoBtnPrimary} px-8 py-4`}>{t.save}</button></div>
            </form>
          )}
          <div className="relative">
            <i className="fas fa-search absolute left-4 top-5 text-gray-400 text-lg"></i>
            <input type="text" placeholder={t.search} value={search} onChange={e=>setSearch(e.target.value)} className={`${styles.neoInput} pl-12 border-gray-300`} />
          </div>
          <div className="grid gap-4">
            {sortedProducts.length === 0 && <p className="text-gray-500 text-center py-8 font-bold">No products found.</p>}
            {sortedProducts.map(p => (
              <div key={p.id} className={getRowStyle(p)}>
                <div>
                  <h3 className="font-bold text-lg text-black">{p.name}</h3>
                  <p className="text-sm text-gray-600 font-medium mt-1">{t.cost}: {p.cost} | {t.price}: {p.price} | {t.qty}: <span className="font-black text-black text-base">{p.quantity}</span> | EXP: {p.expiredDate}</p>
                </div>
                <div className="flex gap-3">
                  <button onClick={(e)=> { e.preventDefault(); e.stopPropagation(); setForm({ id: p.id, name: p.name, cost: p.cost, price: p.price, qty: p.quantity, expDate: p.expiredDate }); setShowForm(true); }} className="p-3 bg-gray-100 rounded-xl text-blue-600 hover:bg-gray-200 transition-colors"><i className="fas fa-edit text-lg"></i></button>
                  <button onClick={(e)=>{ e.preventDefault(); e.stopPropagation(); deleteItem(p.id); }} className="p-3 bg-red-50 rounded-xl text-red-600 hover:bg-red-100 transition-colors"><i className="fas fa-trash-alt text-lg"></i></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const ExpenseTab = ({ t, expenses, userId, showAlert, showConfirm }) => {
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ id: null, name: '', amount: '', deductProfit: true });

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const data = { name: form.name, amount: Number(form.amount), deductProfit: form.deductProfit, date: new Date().toISOString() };
          const safeUserId = String(userId);
          const expensesRef = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/expenses`);

          if (form.id) await expensesRef.doc(String(form.id)).update(data);
          else await expensesRef.add(data);
          
          setShowForm(false); setForm({ id: null, name: '', amount: '', deductProfit: true });
          showAlert("အသုံးစရိတ် သိမ်းဆည်းပြီးပါပြီ။");
        } catch (err) { showAlert("Data သိမ်းဆည်းရာတွင် အမှားဖြစ်နေပါသည်:\n" + err.message); }
      };

        if (!id) return;
        showConfirm('ဤအသုံးစရိတ်ကို ဖယ်ရှားရန် သေချာပါသလား?', async () => {
          try { 
            await db.collection(`artifacts/${APP_ID}/users/${userId}/expenses`).doc(String(id)).delete(); 
            showAlert("အောင်မြင်စွာ ဖယ်ရှားပြီးပါပြီ။");

          catch (err) { showAlert("ဖျက်ရာတွင် အမှားဖြစ်နေပါသည်:\n" + err.message); }

      };

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <div className="flex justify-between items-center">
            <h2 className={styles.headerText}>{t.expense}</h2>
            <button onClick={() => setShowForm(!showForm)} className={styles.neoBtnPrimary}>{showForm ? t.cancel : <><i className="fas fa-plus text-xl"></i> {t.add}</>}</button>
          </div>
          {showForm && (
            <form onSubmit={handleSubmit} className={`${styles.neoCard} p-6 grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 border-black`}>
              <input required placeholder={t.name} value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className={styles.neoInput} />
              <input required type="number" step="any" placeholder="Amount" value={form.amount} onChange={e=>setForm({...form, amount: e.target.value})} className={styles.neoInput} />
              <label className="flex items-center gap-3 md:col-span-2 text-base font-bold text-black cursor-pointer">
                <input type="checkbox" checked={form.deductProfit} onChange={e=>setForm({...form, deductProfit: e.target.checked})} className="w-6 h-6 accent-black" />
                {t.deductProfit}
              </label>
              <div className="md:col-span-2 flex justify-end"><button type="submit" className={`${styles.neoBtnPrimary} px-8 py-4`}>{t.save}</button></div>
            </form>
          )}
          <div className="grid gap-4">
            {expenses.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e => (
              <div key={e.id} className={`${styles.neoCard} p-4 flex justify-between items-center`}>
                <div>
                  <h3 className="font-bold text-lg text-black">{e.name}</h3>
                  <p className="text-sm font-medium text-gray-500 mt-1">Amount: <span className="text-black font-bold">{e.amount}</span> | {e.deductProfit ? 'Deducts Profit' : 'Does not deduct'}</p>
                </div>
                <div className="flex gap-2"><button onClick={(ev)=>{ev.preventDefault(); ev.stopPropagation(); deleteItem(e.id);}} className="p-3 bg-red-50 rounded-xl text-red-600 hover:bg-red-100"><i className="fas fa-trash-alt text-lg"></i></button></div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const ReportTab = ({ t, products, sales, expenses }) => {
      const [filter, setFilter] = useState('daily'); 
      const filteredData = useMemo(() => {
        const now = new Date(); let fSales = []; let fExpenses = [];
        const isSameDay = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
        const isSameWeek = (d1, d2) => {
          const oneJan = new Date(d1.getFullYear(),0,1); const w1 = Math.ceil((((d1.getTime() - oneJan.getTime()) / 86400000) + oneJan.getDay()+1)/7);
          const oneJan2 = new Date(d2.getFullYear(),0,1); const w2 = Math.ceil((((d2.getTime() - oneJan2.getTime()) / 86400000) + oneJan2.getDay()+1)/7);
          return w1 === w2 && d1.getFullYear() === d2.getFullYear();
        };
        const isSameMonth = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth();
        const isSameYear = (d1, d2) => d1.getFullYear() === d2.getFullYear();

        fSales = sales.filter(s => { const d = new Date(s.date); if(filter==='daily') return isSameDay(d, now); if(filter==='weekly') return isSameWeek(d, now); if(filter==='monthly') return isSameMonth(d, now); if(filter==='yearly') return isSameYear(d, now); return true; });
        fExpenses = expenses.filter(e => { if(!e.deductProfit) return false; const d = new Date(e.date); if(filter==='daily') return isSameDay(d, now); if(filter==='weekly') return isSameWeek(d, now); if(filter==='monthly') return isSameMonth(d, now); if(filter==='yearly') return isSameYear(d, now); return true; });

        let totalSalePrice = 0; let totalCost = 0; let totalServiceFee = 0; let itemSalesCount = {};
        fSales.forEach(s => {
          totalServiceFee += Number(s.serviceFee || 0);
          s.items.forEach(i => { 
            totalSalePrice += Math.round(i.price * i.qty); 
            totalCost += Math.round(i.cost * i.qty); 
            itemSalesCount[i.productId] = (itemSalesCount[i.productId] || 0) + Number(i.qty); 
          });
        });
        const totalExpense = fExpenses.reduce((sum, e) => sum + Number(e.amount), 0);
        const netProfit = (totalSalePrice - totalCost) + totalServiceFee - totalExpense;
        const bestSellers = Object.keys(itemSalesCount).map(id => { const p = products.find(x => x.id === id); return { name: p ? p.name : 'Unknown', qty: itemSalesCount[id] }; }).sort((a,b) => b.qty - a.qty).slice(0, 10);
        return { totalSalePrice: totalSalePrice + totalServiceFee, netProfit, bestSellers, totalExpense };
      }, [sales, expenses, products, filter]);

      const inventoryAsset = useMemo(() => { 
        return products.reduce((sum, p) => sum + Math.round(p.cost * p.quantity), 0); 
      }, [products]);

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <h2 className={styles.headerText}>{t.report}</h2>
          <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
            {['daily', 'weekly', 'monthly', 'yearly', 'grand'].map(f => (
              <button key={f} onClick={() => setFilter(f)} className={`${styles.neoBtn} px-6 py-3 whitespace-nowrap border-2 ${filter === f ? 'bg-black text-white border-black' : 'text-gray-600 border-gray-200'}`}>{f === 'grand' ? t.grandTotal : t[f]}</button>
            ))}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className={`${styles.neoCard} p-6 flex flex-col justify-center items-center text-center space-y-4`}>
              <h3 className="text-xl font-bold text-gray-500">Total Sales ({filter})</h3>
              <p className="text-4xl font-extrabold text-black">{filteredData.totalSalePrice.toLocaleString()}</p>
              <h3 className="text-xl font-bold text-gray-500 pt-4 border-t border-gray-200 w-full">Net Profit</h3>
              <p className="text-4xl font-extrabold text-green-600">{filteredData.netProfit.toLocaleString()}</p>
              <p className="text-xs text-gray-400 font-medium">(Sales - Cost + Service Fee - Deductible Expenses)</p>
            </div>
            <div className={`${styles.neoCard} p-6`}>
              <h3 className="text-xl font-bold mb-4 border-b border-gray-200 pb-2 text-black">{t.bestSelling} (Top 10)</h3>
              <div className="space-y-2">
                {filteredData.bestSellers.length === 0 && <p className="text-gray-400 font-medium">No data</p>}
                {filteredData.bestSellers.map((b, i) => (
                  <div key={i} className="flex justify-between items-center bg-gray-50 border border-gray-100 p-3 rounded-xl">
                    <span className="font-bold text-black">{i+1}. {b.name}</span><span className="bg-gray-200 text-black px-3 py-1 rounded-full text-sm font-bold">{Number(b.qty.toFixed(3))} sold</span>
                  </div>
                ))}
              </div>
            </div>
            <div className={`${styles.neoCard} p-6 md:col-span-2 flex justify-between items-center bg-black text-white`}>
              <h3 className="text-xl font-bold">{t.inventory}</h3>
              <p className="text-3xl font-extrabold">{inventoryAsset.toLocaleString()}</p>
            </div>
          </div>
        </div>
      );
    };

    const SaleTab = ({ t, products, customersWithData, sales, userId, showAlert, showConfirm }) => {
      const getLocalDateString = () => {
        const d = new Date();
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        return d.toISOString().split('T')[0];
      };

      const [cart, setCart] = useState([]);
      const [selectedProduct, setSelectedProduct] = useState('');
      const [qty, setQty] = useState('1'); 
      const [customerId, setCustomerId] = useState('');
      const [saleDate, setSaleDate] = useState(getLocalDateString());
      const [serviceFee, setServiceFee] = useState(0);
      const [payAmountInput, setPayAmountInput] = useState('');
      
      const itemsTotal = cart.reduce((sum, item) => sum + Math.round(item.price * item.qty), 0);
      const grandTotal = itemsTotal + Number(serviceFee || 0);
      const payAmount = Number(payAmountInput || 0); 
      const balance = grandTotal - payAmount;
      const isPaid = balance <= 0 && grandTotal > 0;

      const addToCart = () => {
        const p = products.find(x => x.id === selectedProduct);
        if (!p) return;
        
        const quantityToAdd = parseFloat(qty);
        if (isNaN(quantityToAdd) || quantityToAdd <= 0) return showAlert('အရေအတွက် မှန်ကန်စွာ ထည့်ပါ။');
        
        if (p.quantity < quantityToAdd) return showAlert('စတော့စာရင်းတွင် ပစ္စည်းအရေအတွက် မလောက်ပါ!');
        
        const existing = cart.find(c => c.productId === p.id);
        if (existing) {
          if (p.quantity < existing.qty + quantityToAdd) return showAlert('စတော့စာရင်းတွင် ပစ္စည်းအရေအတွက် မလောက်ပါ!');
          setCart(cart.map(c => c.productId === p.id ? { ...c, qty: c.qty + quantityToAdd } : c));
        } else {
          setCart([...cart, { productId: p.id, name: p.name, price: p.price, cost: p.cost, qty: quantityToAdd }]);
        }
        setQty('1'); setSelectedProduct('');
      };

      const removeCart = (idx) => setCart(cart.filter((_, i) => i !== idx));

      const handleCheckout = async () => {
        if (!saleDate) return showAlert('ကျေးဇူးပြု၍ ရက်စွဲ (Date) ရွေးချယ်ပါ။');

        if (payAmount > grandTotal) return showAlert('ပေးချေငွေသည် စုစုပေါင်းကျသင့်ငွေထက် များနေပါသည်။');
        
        try {
          const selectedDateObj = new Date(saleDate);
          const now = new Date();
          selectedDateObj.setHours(now.getHours(), now.getMinutes(), now.getSeconds());
          const saleDateString = selectedDateObj.toISOString();

          const customerObj = customersWithData.find(c => c.id === customerId);
          const safeUserId = String(userId);

          const saleData = {
            customerId: customerId, 
            customerName: customerObj ? customerObj.name : 'Unknown',
            date: saleDateString, 
            items: cart, 
            itemsTotal: itemsTotal,

            grandTotal: grandTotal, 
            payAmount: payAmount,

          for (let item of cart) {
            const p = products.find(x => x.id === item.productId);
            if (p && p.id) {
              await db.collection(`artifacts/${APP_ID}/users/${safeUserId}/products`).doc(String(p.id)).update({
                quantity: Number((p.quantity - item.qty).toFixed(3))

      const deleteSale = (sale) => {

            const safeUserId = String(userId);
            for (let item of sale.items) {

                  quantity: Number((p.quantity + item.qty).toFixed(3))

            showAlert("ရောင်းချမှုမှတ်တမ်းကို ဖျက်သိမ်းပြီး ပစ္စည်းများကို ပြန်လည်ပေါင်းထည့်ပြီးပါပြီ။");
          } catch (err) { showAlert("ဖျက်ရာတွင် အမှားဖြစ်နေပါသည်:\n" + err.message); }
        });
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <h2 className={styles.headerText}>{t.sale} (ဘေလ်ဖွင့်ရန်)</h2>

            <div className="lg:col-span-7 space-y-4">
              <div className={`${styles.neoCard} p-6 space-y-5 border-gray-300 shadow-md`}>

                  <div className="space-y-1">

                    <input type="date" value={saleDate} onChange={e=>setSaleDate(e.target.value)} className={styles.neoInput} required />
                  </div>
                  <div className="space-y-1">
                    <label className="text-sm font-bold text-gray-600 ml-1">ဖောက်သည် ရွေးချယ်ရန် *</label>
                    <select value={customerId} onChange={e=>setCustomerId(e.target.value)} className={styles.neoInput}>
                      <option value="">-- Customer ရွေးချယ်ပါ --</option>
                      {customersWithData.map(c => (
                        <option key={c.id} value={c.id}>
                          {c.name} {c.balance > 0 ? `(ယခင်အကြွေးကျန်: ${c.balance.toLocaleString()})` : ''}
                        </option>
                      ))}
                    </select>
                  </div>
                </div>

                <div className="pt-2 border-t border-gray-200"></div>

                <div className="space-y-2">
                  <label className="text-sm font-bold text-gray-600 ml-1">ပစ္စည်း ထည့်သွင်းရန်</label>
                  <div className="flex flex-col gap-3">
                    <div className="flex gap-2 h-14">
                      <select value={selectedProduct} onChange={e=>setSelectedProduct(e.target.value)} className={`${styles.neoInput} flex-1 !p-3`}>
                        <option value="">-- ပစ္စည်းရွေးပါ --</option>
                        {products.map(p => <option key={p.id} value={p.id} disabled={p.quantity<=0}>{p.name} (လက်ကျန်: {Number(p.quantity)}) - {p.price}Ks</option>)}
                      </select>
                      <input type="number" step="any" min="0.001" value={qty} onChange={e=>setQty(e.target.value)} placeholder="အရေအတွက်" className={`${styles.neoInput} w-24 text-center px-1 font-bold text-black !p-3`} />
                      <button onClick={addToCart} className={`${styles.neoBtnPrimary} px-6 h-full`}><i className="fas fa-plus text-xl"></i></button>
                    </div>
                    {/* Fraction Shortcut Buttons (Larger for Touch) */}
                    <div className="flex flex-wrap gap-2 mt-2">
                      <button onClick={()=>setQty('0.5')} className="text-sm font-bold bg-white text-black px-4 py-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100 active:scale-95 transition-transform touch-manipulation">၁/၂</button>
                      <button onClick={()=>setQty(String(Number((1/3).toFixed(3))))} className="text-sm font-bold bg-white text-black px-4 py-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100 active:scale-95 transition-transform touch-manipulation">၁/၃</button>
                      <button onClick={()=>setQty(String(Number((2/3).toFixed(3))))} className="text-sm font-bold bg-white text-black px-4 py-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100 active:scale-95 transition-transform touch-manipulation">၂/၃</button>
                      <button onClick={()=>setQty('0.25')} className="text-sm font-bold bg-white text-black px-4 py-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100 active:scale-95 transition-transform touch-manipulation">၁/၄</button>
                      <button onClick={()=>setQty('0.2')} className="text-sm font-bold bg-white text-black px-4 py-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100 active:scale-95 transition-transform touch-manipulation">၁/၅</button>
                      <button onClick={()=>setQty('1')} className="text-sm font-bold bg-black text-white px-4 py-2 rounded-xl border-2 border-black hover:bg-gray-800 active:scale-95 transition-transform touch-manipulation">၁ ခု အပြည့်</button>
                    </div>

                <div className="min-h-[180px] bg-gray-50 rounded-xl p-4 border-2 border-gray-200">

                        <button onClick={()=>removeCart(i)} className="text-red-600 bg-red-50 hover:bg-red-100 p-3 rounded-xl transition-colors touch-manipulation"><i className="fas fa-trash-alt"></i></button>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="bg-gray-100 p-5 rounded-xl border border-gray-200 space-y-4 text-base font-bold text-black">
                  <div className="flex justify-between items-center text-gray-600">
                    <span>ပစ္စည်းတန်ဖိုး စုစုပေါင်း:</span> <span className="text-black">{itemsTotal.toLocaleString()}</span>

                  </div>

                  </div>
                  <div className={`flex justify-between items-center pt-2 text-xl ${isPaid && grandTotal > 0 ? 'text-green-600' : 'text-red-600'}`}>
                    <span>{isPaid && grandTotal > 0 ? 'ငွေချေမှု အခြေအနေ:' : 'အကြွေးကျန် (Balance):'}</span> 
                    <span className="font-black">{isPaid && grandTotal > 0 ? t.paid : balance.toLocaleString()}</span>
                  </div>
                </div>

                <button onClick={handleCheckout} className={`${styles.neoBtnPrimary} w-full h-16 text-xl tracking-wide`}>
                  {t.save} / ရောင်းချမည်
                </button>
              </div>
            </div>

            <div className="lg:col-span-5 space-y-4">
              <h3 className="font-black text-xl flex items-center gap-2 px-2 text-black"><i className="fas fa-file-invoice-dollar text-gray-400"></i> မှတ်တမ်းများ (နောက်ဆုံးရောင်းချမှုများ)</h3>
              <div className="space-y-4 max-h-[80vh] overflow-y-auto pr-2 custom-scrollbar">
                {sales.length === 0 && <p className="text-gray-500 text-center py-8 font-bold">မှတ်တမ်းမရှိသေးပါ။</p>}
                
                {sales.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 15).map(s => {
                  const customerNameDisplay = s.customerName || 'Unknown';
                  return (
                    <div key={s.id} className={`${styles.neoCard} p-4 border-l-4 ${s.status === 'Paid' ? 'border-l-green-500' : 'border-l-red-500'}`}>
                      <div className="flex justify-between items-start border-b border-gray-100 pb-3 mb-3">
                        <div>
                          <span className="font-black text-black text-lg block">{customerNameDisplay}</span>
                          <span className="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md mt-1 inline-block">
                            <i className="fas fa-calendar-day mr-1"></i>
                            {new Date(s.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}
                          </span>
                        </div>
                        <span className={`px-3 py-1 text-xs rounded-full font-bold border ${s.status === 'Paid' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                          {s.status}

                        </div>
                        <button onClick={(e)=>{ e.preventDefault(); e.stopPropagation(); deleteSale(s); }} className="text-red-500 hover:text-red-700 bg-gray-100 p-3 rounded-xl touch-manipulation"><i className="fas fa-trash-alt"></i></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

    const CustomerTab = ({ t, customersWithData, sales, userId, showAlert, showConfirm }) => {
      const [activeView, setActiveView] = useState('list'); 
      const [search, setSearch] = useState('');
      const [sortOrder, setSortOrder] = useState('alpha'); 
      const [form, setForm] = useState({ id: null, name: '', age: '', gender: 'Male', phone1: '', phone2: '', phone3: '', diagnosis: '' });
      
      const [selectedCustomerId, setSelectedCustomerId] = useState(null);
      const [payAmountInput, setPayAmountInput] = useState('');

      const sortedCustomers = useMemo(() => {
        let res = [...customersWithData].filter(c => (c.name || '').toLowerCase().includes(search.toLowerCase()));
        if (sortOrder === 'alpha') res.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        else res.sort((a, b) => b.balance - a.balance); 
        return res;
      }, [customersWithData, search, sortOrder]);

      const openForm = (c = null) => {
        if (c) {
          setForm({ 
            id: c.id, name: c.name, age: c.age || '', gender: c.gender || 'Male', 
            phone1: c.phone1 || '', phone2: c.phone2 || '', phone3: c.phone3 || '', diagnosis: c.diagnosis || '' 
          });
        } else {
          setForm({ id: null, name: '', age: '', gender: 'Male', phone1: '', phone2: '', phone3: '', diagnosis: '' });
        }
        setActiveView('form');
      };

      const openDetail = (id) => {
        setSelectedCustomerId(id);
        setPayAmountInput('');
        setActiveView('detail');
      };

      const handleSaveCustomer = async (e) => {
        e.preventDefault();
        try {
          const safeUserId = String(userId);
          const { id, ...customerData } = form;
          const customersRef = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/customers`);
          
          if (id) {
            await customersRef.doc(String(id)).update(customerData);
            showAlert("Customer အချက်အလက်များကို အောင်မြင်စွာ ပြင်ဆင်ပြီးပါပြီ။");
          } else {
            await customersRef.add(customerData);
            showAlert("Customer အချက်အလက်ကို အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။");
          }
          setActiveView('list');
        } catch (err) { showAlert("Data သိမ်းဆည်းရာတွင် အမှားဖြစ်နေပါသည်:\n" + err.message); }
      };

      const handleDeleteCustomer = (id) => {
        if (!id) return;
        showConfirm('ဤဖောက်သည်၏ အချက်အလက်များကို အပြီးတိုင် ဖယ်ရှားရန် သေချာပါသလား?', async () => {
          try {
            await db.collection(`artifacts/${APP_ID}/users/${userId}/customers`).doc(String(id)).delete();
            showAlert("အောင်မြင်စွာ ဖယ်ရှားပြီးပါပြီ။");
            if(activeView === 'detail') setActiveView('list');
          } catch (err) { showAlert("ဖျက်ရာတွင် အမှားဖြစ်နေပါသည်:\n" + err.message); }
        });
      };

      const handleIndividualPayment = (customerId, totalUnpaidBalance) => {
        const payment = Number(payAmountInput);
        if (!payment || payment <= 0) return showAlert("ပေးသွင်းငွေ ပမာဏကို မှန်ကန်စွာ ထည့်ပါ။");
        if (payment > totalUnpaidBalance) return showAlert(`ပေးသွင်းငွေသည် လက်ကျန်အကြွေး (${totalUnpaidBalance.toLocaleString()}) ထက် များနေပါသည်။`);

        showConfirm(`${payment.toLocaleString()} ကျပ် ငွေချေရန် သေချာပါသလား?\n\n(စနစ်မှ အဟောင်းဆုံး အကြွေးဘေလ်များကို အရင်ဆုံး အလိုအလျောက် ဖြတ်တောက် ရှင်းလင်းပေးသွားပါမည်။)`, async () => {
          try {
            const safeUserId = String(userId);
            let amountLeftToDistribute = payment;
            
            const unpaidSales = sales
              .filter(s => s.customerId === customerId && s.status === 'Unpaid' && Number(s.balance) > 0)
              .sort((a, b) => new Date(a.date) - new Date(b.date)); 

            const salesRef = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/sales`);

            for (let s of unpaidSales) {
              if (amountLeftToDistribute <= 0) break; 

              let currentSaleBalance = Number(s.balance);
              let currentPaidAmount = Number(s.payAmount || 0);

              if (amountLeftToDistribute >= currentSaleBalance) {
                amountLeftToDistribute -= currentSaleBalance;
                await salesRef.doc(String(s.id)).update({
                  balance: 0, payAmount: currentPaidAmount + currentSaleBalance, status: 'Paid' 
                });
              } else {
                await salesRef.doc(String(s.id)).update({
                  balance: currentSaleBalance - amountLeftToDistribute, payAmount: currentPaidAmount + amountLeftToDistribute
                });
                amountLeftToDistribute = 0; 
              }
            }
            setPayAmountInput('');
            showAlert("ငွေချေမှု အောင်မြင်ပါသည်။\nသက်ဆိုင်ရာ အရောင်းမှတ်တမ်းများတွင် အကြွေးများ အလိုအလျောက် ရှင်းလင်းသွားပါပြီ။");
          } catch (err) { showAlert("ငွေချေရာတွင် အမှားဖြစ်နေပါသည်:\n" + err.message); }
        });
      };

      if (activeView === 'form') {
        return (
          <div className="space-y-6 animate-in fade-in zoom-in duration-300">
            <div className="flex items-center gap-4">
              <button onClick={() => setActiveView('list')} className={`${styles.neoBtn} !p-3 rounded-full`}><i className="fas fa-arrow-left text-xl"></i></button>
              <h2 className={styles.headerText}>{form.id ? 'ဖောက်သည် အချက်အလက် ပြင်ဆင်ရန်' : 'ဖောက်သည် အသစ်ထည့်ရန်'}</h2>
            </div>
            <form onSubmit={handleSaveCustomer} className={`${styles.neoCard} p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 border-black`}>
              <div className="space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">အမည် (Name) *</label><input required placeholder="ဖောက်သည်အမည်" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">အသက် (Age)</label><input type="number" placeholder="အသက်" value={form.age} onChange={e=>setForm({...form, age: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">ကျား / မ (Gender)</label><select value={form.gender} onChange={e=>setForm({...form, gender: e.target.value})} className={styles.neoInput}><option>Male</option><option>Female</option></select></div>
              <div className="space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">ဖုန်းနံပါတ် ၁</label><input required placeholder="09xxxxxxxxx" value={form.phone1} onChange={e=>setForm({...form, phone1: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">ဖုန်းနံပါတ် ၂ (Optional)</label><input placeholder="Phone 2 (Opt)" value={form.phone2} onChange={e=>setForm({...form, phone2: e.target.value})} className={styles.neoInput} /></div>
              <div className="space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">ဖုန်းနံပါတ် ၃ (Optional)</label><input placeholder="Phone 3 (Opt)" value={form.phone3} onChange={e=>setForm({...form, phone3: e.target.value})} className={styles.neoInput} /></div>
              <div className="md:col-span-2 space-y-2"><label className="text-sm font-bold text-gray-700 ml-1">ရောဂါ / မှတ်ချက် (Diagnosis / Remark)</label><textarea placeholder="မှတ်ချက်များ ရေးသားရန်..." value={form.diagnosis} onChange={e=>setForm({...form, diagnosis: e.target.value})} className={`${styles.neoInput} h-28`} /></div>
              <div className="md:col-span-2 flex justify-end gap-4 mt-4"><button type="button" onClick={() => setActiveView('list')} className={`${styles.neoBtn} px-8 py-4`}>{t.cancel}</button><button type="submit" className={`${styles.neoBtnPrimary} px-10 py-4`}>{t.save}</button></div>
            </form>
          </div>
        );
      }

      if (activeView === 'detail' && selectedCustomerId) {
        const customer = customersWithData.find(c => c.id === selectedCustomerId);
        if (!customer) { setActiveView('list'); return null; }
        const customerSales = customer.custSales.sort((a, b) => new Date(b.date) - new Date(a.date));

        return (
          <div className="space-y-6 animate-in slide-in-from-right-8 duration-300">
            <div className="flex items-center gap-4">
              <button onClick={() => setActiveView('list')} className={`${styles.neoBtn} !p-3 rounded-full`}><i className="fas fa-arrow-left text-xl"></i></button>
              <h2 className={styles.headerText}>ဖောက်သည် အသေးစိတ်မှတ်တမ်း</h2>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
              <div className="xl:col-span-5 space-y-6">
                <div className={`${styles.neoCard} p-6 flex flex-col items-center text-center relative overflow-hidden bg-gray-50 border-gray-300`}>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleDeleteCustomer(customer.id); }} className="absolute top-4 right-4 text-red-500 hover:text-red-700 bg-white border border-gray-200 p-3 rounded-full shadow-sm transition-colors touch-manipulation"><i className="fas fa-trash-alt"></i></button>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); openForm(customer); }} className="absolute top-4 right-16 text-blue-600 hover:text-blue-800 bg-white border border-gray-200 p-3 rounded-full shadow-sm transition-colors touch-manipulation"><i className="fas fa-edit"></i></button>
                  
                  <div className="w-24 h-24 bg-black rounded-full flex items-center justify-center text-white mb-4 shadow-sm"><i className="fas fa-user text-4xl"></i></div>
                  <h3 className="text-3xl font-black text-black mb-2">{customer.name}</h3>
                  <p className="text-sm font-bold text-gray-700 mb-4 bg-gray-200 px-4 py-1.5 rounded-full">{customer.gender} {customer.age && `| ${customer.age} နှစ်`}</p>
                  
                  <div className="w-full text-left space-y-3 mt-2 border-t border-gray-300 pt-5">
                    <div className="flex items-start gap-4">
                      <div className="bg-gray-200 p-2 rounded-lg flex-shrink-0"><i className="fas fa-phone text-black text-lg"></i></div>
                      <div className="text-base font-bold text-black mt-1">
                        <p>{customer.phone1 || 'ဖုန်းနံပါတ် မရှိပါ'}</p>
                        {customer.phone2 && <p>{customer.phone2}</p>}
                        {customer.phone3 && <p>{customer.phone3}</p>}
                      </div>
                    </div>
                    {customer.diagnosis && (
                      <div className="flex items-start gap-4 mt-4">
                        <div className="bg-gray-200 p-2 rounded-lg flex-shrink-0"><i className="fas fa-file-alt text-black text-lg"></i></div>
                        <p className="text-sm font-medium text-gray-800 mt-1 leading-relaxed">{customer.diagnosis}</p>
                      </div>
                    )}
                  </div>
                </div>

                <div className={`${styles.neoCard} p-6 text-center space-y-5 border-gray-300`}>
                  <div className="grid grid-cols-2 gap-4 border-b border-gray-200 pb-5">
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                      <i className="fas fa-chart-line text-black text-2xl mx-auto mb-2"></i>
                      <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">စုစုပေါင်း ဝယ်ယူထားမှု</p>
                      <p className="text-xl font-black text-black mt-1">{customer.totalSpent.toLocaleString()}</p>
                    </div>
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                      <i className="fas fa-shopping-bag text-black text-2xl mx-auto mb-2"></i>
                      <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">ဝယ်ယူမှု အကြိမ်</p>
                      <p className="text-xl font-black text-black mt-1">{customer.custSales.length} ကြိမ်</p>
                    </div>
                  </div>

                  <div className="pt-2">
                    <p className="text-base font-bold text-gray-600 mb-2 flex items-center justify-center gap-2"><i className="fas fa-wallet text-xl"></i> လက်ရှိ အကြွေးကျန်</p>
                    <p className={`text-5xl font-black mb-6 tracking-tight ${customer.balance > 0 ? 'text-red-600' : 'text-green-600'}`}>
                      {customer.balance.toLocaleString()}
                    </p>

                    {customer.balance > 0 ? (
                      <div className="space-y-4 bg-gray-50 p-6 rounded-2xl border border-gray-300 shadow-sm">
                        <p className="text-base font-bold text-black flex items-center justify-center gap-2 mb-2">
                          <i className="fas fa-credit-card text-black text-xl"></i> ငွေချေရန် ပမာဏ
                        </p>
                        <input 
                          type="number" 
                          step="any"
                          value={payAmountInput} 
                          onChange={e => setPayAmountInput(e.target.value)} 
                          placeholder="0" 
                          className={`${styles.neoInput} text-center font-black text-2xl h-16 text-black border-gray-400 bg-white`} 
                        />
                        <button 
                          onClick={() => handleIndividualPayment(customer.id, customer.balance)} 
                          className={`${styles.neoBtnPrimary} w-full h-16 text-xl tracking-wide mt-2`}
                        >
                          ငွေချေမည် (Pay)
                        </button>
                        <p className="text-xs font-bold text-gray-500 leading-tight mt-3">မှတ်ချက်: အဟောင်းဆုံး ဝယ်ယူမှုအကြွေးများမှစ၍ အလိုအလျောက် အဆင့်ဆင့် ဖြတ်တောက် ရှင်းလင်းသွားပါမည်။</p>
                      </div>
                    ) : (
                      <div className="bg-green-50 text-green-700 font-bold p-5 rounded-2xl border border-green-200 flex flex-col justify-center items-center gap-3">
                        <div className="bg-green-200 p-3 rounded-full"><i className="fas fa-check text-2xl"></i></div>
                        <span className="text-lg">အကြွေးကင်းရှင်းပါသည်</span>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="xl:col-span-7">
                <div className={`${styles.neoCard} p-6 h-full flex flex-col bg-gray-50 border-gray-300`}>
                  <div className="flex justify-between items-center border-b border-gray-300 pb-4 mb-5">
                    <h3 className="text-2xl font-black flex items-center gap-3 text-black">
                      <i className="fas fa-history text-gray-400"></i> ဝယ်ယူမှု မှတ်တမ်းများ 
                    </h3>
                  </div>
                  
                  <div className="flex-1 space-y-5 overflow-y-auto pr-2 custom-scrollbar" style={{maxHeight: 'calc(100vh - 200px)'}}>
                    {customerSales.length === 0 && (
                      <div className="flex flex-col items-center justify-center h-40 text-gray-400">
                        <i className="fas fa-shopping-cart text-5xl mb-3"></i>
                        <p className="font-bold text-lg">ဝယ်ယူမှု မှတ်တမ်းမရှိသေးပါ။</p>
                      </div>
                    )}
                    
                    {customerSales.map((s, index) => (
                      <div key={s.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 hover:border-gray-300 transition-all">
                        <div className="flex justify-between items-center mb-4 pb-3 border-b border-gray-100">
                          <div className="flex items-center gap-3 text-sm font-bold text-gray-600">
                            <span className="bg-black text-white px-3 py-1 rounded-md text-xs">#{customerSales.length - index}</span>
                            <div className="flex items-center gap-1.5">
                              <i className="fas fa-calendar-alt text-gray-400"></i>
                              <span className="text-black bg-gray-100 px-2 py-0.5 rounded">{new Date(s.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                            </div>
                            <span className="text-gray-300">|</span> 
                            <span>{new Date(s.date).toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit' })}</span>
                          </div>
                          <span className={`px-4 py-1.5 text-xs uppercase tracking-wider rounded-full font-black border ${s.status === 'Paid' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                            {s.status === 'Paid' ? 'ငွေချေပြီး' : 'အကြွေး'}
                          </span>
                        </div>
                        
                        <div className="space-y-3 mb-5">
                          {s.items.map((i, idx) => (
                            <div key={idx} className="flex justify-between items-center font-bold text-black text-base">
                              <span className="flex items-center gap-3">
                                <span className="w-2 h-2 bg-gray-300 rounded-full block"></span>
                                {i.name} 
                                <span className="text-xs font-black bg-gray-100 border border-gray-200 px-2 py-1 rounded-md ml-2 text-black">x{i.qty}</span>
                              </span>
                              <span>{(Math.round(i.price * i.qty)).toLocaleString()}</span>
                            </div>
                          ))}
                        </div>

                        <div className="bg-gray-50 rounded-xl p-5 border border-gray-200">
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 text-sm">
                            <div className="space-y-3">
                              <div className="flex justify-between text-gray-600 font-bold"><span>ပစ္စည်းတန်ဖိုး:</span><span className="text-black">{s.itemsTotal.toLocaleString()}</span></div>
                              <div className="flex justify-between text-gray-600 font-bold"><span>ဝန်ဆောင်ခ:</span><span className="text-black">{s.serviceFee || 0}</span></div>
                              <div className="flex justify-between font-black text-black pt-3 border-t border-gray-300 text-base"><span>စုစုပေါင်း (Total):</span><span>{s.grandTotal.toLocaleString()}</span></div>
                            </div>
                            <div className="space-y-3 sm:border-l sm:border-gray-300 sm:pl-6 pt-4 sm:pt-0 border-t border-gray-200 sm:border-t-0">
                              <div className="flex justify-between font-bold text-green-700"><span>ပေးချေပြီး:</span><span>{s.payAmount ? s.payAmount.toLocaleString() : 0}</span></div>
                              <div className={`flex justify-between font-black pt-3 border-t border-gray-300 text-lg ${s.balance > 0 ? 'text-red-600' : 'text-gray-400'}`}>
                                <span>အကြွေးကျန်:</span><span>{s.balance.toLocaleString()}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h2 className={styles.headerText}>ဖောက်သည်စာရင်း (Customers)</h2>
            <button onClick={() => openForm()} className={`${styles.neoBtnPrimary} px-6`}><i className="fas fa-plus text-xl"></i> Customer အသစ်ထည့်ရန်</button>
          </div>

          <div className="flex flex-col md:flex-row gap-4">
            <div className="relative flex-1">
              <i className="fas fa-search absolute left-4 top-5 text-gray-400 text-lg"></i>
              <input type="text" placeholder="အမည်ဖြင့် ရှာဖွေရန်..." value={search} onChange={e=>setSearch(e.target.value)} className={`${styles.neoInput} pl-12 bg-white border-gray-300`} />
            </div>
            <select value={sortOrder} onChange={e=>setSortOrder(e.target.value)} className={`${styles.neoInput} md:w-56 font-bold bg-white border-gray-300`}>
              <option value="alpha">A-Z စီရန်</option>
              <option value="balance">အကြွေးအများဆုံး</option>
            </select>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            {sortedCustomers.length === 0 && <p className="col-span-full text-center py-12 text-gray-500 font-bold text-lg">ဖောက်သည်စာရင်း မရှိသေးပါ။</p>}
            
            {sortedCustomers.map(c => (
              <div key={c.id} className={`${styles.neoCard} p-6 flex flex-col justify-between hover:shadow-md transition-all duration-200 cursor-pointer group bg-white border-gray-300`} onClick={() => openDetail(c.id)}>
                <div className="flex justify-between items-start mb-5">
                  <div className="flex items-center gap-4">
                    <div className="w-14 h-14 bg-black rounded-full flex items-center justify-center text-white font-black text-2xl shadow-sm">{c.name.charAt(0).toUpperCase()}</div>
                    <div>
                      <h3 className="font-black text-xl text-black leading-tight mb-1.5">{c.name}</h3>
                      <p className="text-xs font-bold text-gray-600 flex items-center gap-1.5 bg-gray-100 px-2 py-1 rounded-md w-fit border border-gray-200"><i className="fas fa-phone text-[10px]"></i> {c.phone1 || '-'}</p>
                    </div>
                  </div>
                  
                  <div className="flex gap-2">
                    <button 
                      onClick={(e) => { e.preventDefault(); e.stopPropagation(); openForm(c); }} 
                      className="p-3 bg-gray-50 rounded-xl text-blue-600 hover:bg-gray-200 border border-gray-200 transition-colors touch-manipulation"
                      title="ပြင်ဆင်မည်"
                    >
                      <i className="fas fa-edit"></i>
                    </button>
                    <button 
                      onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleDeleteCustomer(c.id); }} 
                      className="p-3 bg-red-50 rounded-xl text-red-600 hover:bg-red-100 border border-red-100 transition-colors touch-manipulation"
                      title="ဖျက်မည်"
                    >
                      <i className="fas fa-trash-alt"></i>
                    </button>
                  </div>

                </div>
                <div className="pt-5 mt-2 border-t border-gray-100 flex items-end justify-between">
                  <div>
                    <p className="text-xs font-black text-gray-400 uppercase tracking-widest mb-1.5">လက်ကျန်ငွေ</p>
                    <p className={`text-3xl font-black tracking-tight ${c.balance > 0 ? 'text-red-600' : 'text-green-600'}`}>{c.balance > 0 ? c.balance.toLocaleString() : '0'}</p>
                  </div>
                  <div className="text-right flex flex-col items-end gap-2">
                    <span className="text-xs font-bold text-black bg-gray-50 px-2.5 py-1 rounded-lg border border-gray-200 flex items-center gap-1.5"><i className="fas fa-chart-line text-gray-400"></i>{c.totalSpent.toLocaleString()}</span>
                    <span className="text-xs font-bold text-black bg-gray-50 px-2.5 py-1 rounded-lg border border-gray-200 flex items-center gap-1.5"><i className="fas fa-shopping-bag text-gray-400"></i>{c.custSales.length} ကြိမ်</span>
                  </div>
                </div>
                <div className="mt-6"><button onClick={(e) => { e.preventDefault(); e.stopPropagation(); openDetail(c.id); }} className={`${styles.neoBtn} w-full text-sm font-black text-black bg-gray-50 hover:bg-gray-100 hover:border-black py-4`}><i className="fas fa-eye text-gray-500 mr-1"></i> မှတ်တမ်းကြည့်မည် / ငွေချေမည်</button></div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    const App = () => {
      const [user, setUser] = useState(null);
      const [lang, setLang] = useState('my');
      const [currentTab, setCurrentTab] = useState('customer');
      const t = dict[lang];

      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null, isProcessing: false });

      const showAlert = (message) => setDialog({ isOpen: true, type: 'alert', message, onConfirm: null, isProcessing: false });
      const showConfirm = (message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', message, onConfirm, isProcessing: false });
      const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));

      const [products, setProducts] = useState([]);
      const [sales, setSales] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [expenses, setExpenses] = useState([]);

      useEffect(() => {
        const initAuth = async () => {
          if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
            try { await auth.signInWithCustomToken(window.__initial_auth_token); } catch(e){ console.error(e); }
          }
        };
        initAuth();
        
        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          if(u && currentTab === 'system') setCurrentTab('customer');
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !APP_ID) return;
        
        const safeUserId = String(user.uid);
        
        const unSubP = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/products`).onSnapshot(snap => setProducts(snap.docs.map(d => ({...d.data(), id: d.id}))));
        const unSubS = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/sales`).onSnapshot(snap => setSales(snap.docs.map(d => ({...d.data(), id: d.id}))));
        const unSubC = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/customers`).onSnapshot(snap => setCustomers(snap.docs.map(d => ({...d.data(), id: d.id}))));
        const unSubE = db.collection(`artifacts/${APP_ID}/users/${safeUserId}/expenses`).onSnapshot(snap => setExpenses(snap.docs.map(d => ({...d.data(), id: d.id}))));

        return () => { unSubP(); unSubS(); unSubC(); unSubE(); };
      }, [user]);

      const customersWithData = useMemo(() => {
        return customers.map(c => {
          const custSales = sales.filter(s => s.customerId === c.id);
          const balance = custSales.reduce((sum, s) => sum + (Number(s.balance) || 0), 0);
          const totalSpent = custSales.reduce((sum, s) => sum + (Number(s.grandTotal) || 0), 0);
          return { ...c, balance, totalSpent, custSales };
        });
      }, [customers, sales]);

      const handleAuth = async (e, isLogin, email, password) => {
        e.preventDefault();
        try {
          if (isLogin) await auth.signInWithEmailAndPassword(email, password);
          else await auth.createUserWithEmailAndPassword(email, password);
        } catch (error) { showAlert("အကောင့်ဝင်ရာတွင် အမှားဖြစ်နေပါသည်:\n" + error.message); }
      };
      const handleGuestLogin = async () => {
        try { await auth.signInAnonymously(); } catch (error) { showAlert("Guest အနေဖြင့် ဝင်ရောက်ရာတွင် အမှားဖြစ်နေပါသည်:\n" + error.message); }
      };

      return (
        <Fragment>
          {!user ? (
            <AuthScreen handleAuth={handleAuth} handleGuest={handleGuestLogin} t={t} lang={lang} setLang={setLang} />
          ) : (
            // Full Screen App Layout
            <div className="flex h-[100dvh] w-full font-sans overflow-hidden bg-gray-50">
              
              {/* Tablet/Desktop Sidebar Menu (Hide on Mobile) */}
              <nav className="hidden md:flex flex-col w-56 lg:w-64 h-full bg-white z-40 border-r border-gray-200 p-4 lg:p-6 overflow-y-auto custom-scrollbar shadow-sm">
                <div className="mb-8 mt-4 text-center">
                  <h1 className="text-3xl font-black text-black">Nay N Nay<br/>POS</h1>
                </div>
                <div className="flex flex-col gap-2">
                  {[
                    { id: 'customer', icon: "fas fa-users", label: t.customer },
                    { id: 'sale', icon: "fas fa-shopping-cart", label: t.sale },
                    { id: 'purchase', icon: "fas fa-home", label: t.purchase },
                    { id: 'expense', icon: "fas fa-file-invoice-dollar", label: t.expense },
                    { id: 'report', icon: "fas fa-chart-pie", label: t.report },
                    { id: 'system', icon: "fas fa-cog", label: t.system },
                  ].map(item => (
                    <button
                      key={item.id}
                      onClick={() => setCurrentTab(item.id)}
                      className={`flex items-center gap-3 lg:gap-4 p-4 rounded-xl transition-all touch-manipulation ${
                        currentTab === item.id 
                          ? 'bg-black text-white shadow-md' 
                          : 'text-gray-600 hover:bg-gray-100 hover:text-black'
                      }`}
                    >
                      <i className={`${item.icon} text-xl w-6 text-center`}></i>
                      <span className="text-sm font-bold">{item.label}</span>
                    </button>
                  ))}
                </div>
              </nav>

              {/* Main Content Area (Scrollable properly) */}
              <main className="flex-1 h-full overflow-y-auto custom-scrollbar relative bg-gray-50 pb-[100px] md:pb-0" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom) + 90px)' }}>
                <div className="p-4 md:p-6 lg:p-8 w-full max-w-7xl mx-auto min-h-full">
                  {currentTab === 'system' && <SystemTab user={user} t={t} lang={lang} setLang={setLang} />}
                  {currentTab === 'purchase' && <PurchaseTab t={t} products={products} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
                  {currentTab === 'sale' && <SaleTab t={t} products={products} customersWithData={customersWithData} sales={sales} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
                  {currentTab === 'customer' && <CustomerTab t={t} customersWithData={customersWithData} sales={sales} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
                  {currentTab === 'expense' && <ExpenseTab t={t} expenses={expenses} userId={user.uid} showAlert={showAlert} showConfirm={showConfirm} />}
                  {currentTab === 'report' && <ReportTab t={t} products={products} sales={sales} expenses={expenses} />}
                </div>
              </main>

              {/* Mobile Bottom Menu (Hide on Tablet/Desktop) */}
              <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white z-50 flex justify-around p-2 border-t border-gray-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom) + 0.5rem)' }}>
                {[
                  { id: 'customer', icon: "fas fa-users", label: t.customer },
                  { id: 'sale', icon: "fas fa-shopping-cart", label: t.sale },
                  { id: 'purchase', icon: "fas fa-home", label: t.purchase },
                  { id: 'expense', icon: "fas fa-file-invoice-dollar", label: t.expense },
                  { id: 'report', icon: "fas fa-chart-pie", label: t.report },
                  { id: 'system', icon: "fas fa-cog", label: t.system },
                ].map(item => (
                  <button
                    key={item.id}
                    onClick={() => setCurrentTab(item.id)}
                    className={`flex flex-col items-center justify-center gap-1.5 p-2 flex-1 rounded-xl transition-all touch-manipulation min-h-[60px] ${
                      currentTab === item.id 
                        ? 'text-black bg-gray-100 font-bold' 
                        : 'text-gray-400 font-medium'
                    }`}
                  >
                    <i className={`${item.icon} text-xl mb-0.5`}></i>
                    <span className="text-[10px] leading-none">{item.label}</span>
                  </button>
                ))}
              </nav>

            </div>
          )}

          {/* Global Dialog Modal */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className={`${styles.neoCard} p-8 max-w-sm w-full relative flex flex-col items-center text-center shadow-2xl`}>
                <i className={`fas ${dialog.type === 'confirm' ? 'fa-exclamation-triangle text-orange-500' : 'fa-info-circle text-blue-500'} text-6xl mb-5`}></i>
                <h3 className="text-2xl font-black mb-3 text-black">
                  {dialog.type === 'confirm' ? 'သေချာပါသလား?' : 'အသိပေးချက်'}
                </h3>
                <p className="mb-8 font-medium text-gray-600 text-base whitespace-pre-wrap">{dialog.message}</p>
                <div className="flex gap-4 w-full">
                  {dialog.type === 'confirm' && (
                    <button disabled={dialog.isProcessing} onClick={closeDialog} className={`${styles.neoBtn} flex-1 text-gray-600 border-gray-300 py-4`}>
                      မလုပ်တော့ပါ
                    </button>
                  )}
                  <button
                    disabled={dialog.isProcessing}
                    onClick={async () => {
                      if (dialog.type === 'confirm' && dialog.onConfirm) {
                        setDialog(prev => ({ ...prev, isProcessing: true }));
                        try { await dialog.onConfirm(); } catch (e) { setDialog(prev => ({ ...prev, isProcessing: false })); }
                      } else { closeDialog(); }
                    }}
                    className={`${styles.neoBtnPrimary} flex-1 flex justify-center items-center gap-2 py-4 text-lg`}
                  >
                    {dialog.isProcessing && <i className="fas fa-spinner fa-spin"></i>}
                    {dialog.isProcessing ? 'ခဏစောင့်ပါ...' : (dialog.type === 'confirm' ? 'သေချာပါတယ်' : 'အိုကေ')}
                  </button>
                </div>
              </div>
            </div>
          )}
        </Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(<App />);
  </script>
</body>
</html>
